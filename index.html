<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>竹北交通生存戰：深夜下班路 (視覺清晰版)</title>
<style>
  body {
    margin: 0; 
    overflow: hidden; 
    background-color: #05050a; /* 深夜黑紫 */
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    user-select: none;
    color: #fff;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
  }
  /* 背景與天空 (血紅至深紫漸層) */
  #sky {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #2a0808 0%, #0d0914 40%, #05050a 100%);
    z-index: 0;
  }
  /* 道路主體 */
  #stage {
    position: relative;
    width: 100%;
    max-width: 600px; /* 限制最大寬度，手機與電腦都能玩 */
    height: 100%;
    background: linear-gradient(to bottom, #111 0%, #1a1a24 100%);
    z-index: 1;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
  }
  /* 路肩與兩側建築區域 */
  #shoulder {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .buildings {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 34%;
    z-index: 2;
  }
  #buildings-left { left: 0; }
  #buildings-right { right: 0; transform: scaleX(-1); }
  
  /* 道路中線 (雙黃線) */
  #centerline {
    position: absolute;
    left: 50%;
    top: -100px;
    width: 4px;
    height: 120%;
    margin-left: -2px;
    background-image: linear-gradient(to bottom, #f39c12 50%, transparent 50%);
    background-size: 100% 80px;
    z-index: 1;
  }
  .moving #centerline {
    animation: dash 0.4s linear infinite;
  }
  @keyframes dash {
    0% { transform: translateY(0); }
    100% { transform: translateY(80px); }
  }

  /* 實體層 (玩家與車輛) */
  #vlayer {
    position: absolute;
    inset: 0;
    z-index: 10;
  }

  /* UI 介面層 */
  #ui-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  .score-board {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px #ff0055, 2px 2px 0px #000;
  }
  
  /* 嘉興路路牌 */
  #street-sign {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #006400;
    border: 2px solid #fff;
    border-radius: 4px;
    padding: 5px 15px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    text-shadow: 1px 1px 2px #000;
  }
  #street-sign::after {
    content: "Jiaxing Rd.";
    display: block;
    font-size: 10px;
    text-align: center;
    margin-top: 2px;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 10, 0.85);
    pointer-events: auto;
    backdrop-filter: blur(4px);
  }
  .hidden { display: none !important; }
  
  h1 {
    font-size: 42px;
    margin: 0 0 10px 0;
    color: #ff3366;
    text-shadow: 0 0 20px #ff3366, 0 0 40px #aa0022;
    text-align: center;
  }
  p {
    font-size: 18px;
    color: #ccc;
    text-align: center;
    max-width: 80%;
    line-height: 1.5;
  }
  .btn {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(45deg, #aa0022, #ff3366);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:active {
    transform: scale(0.95);
    box-shadow: 0 0 10px rgba(255, 51, 102, 0.8);
  }

  /* 車輛與玩家的絕對定位 wrapper */
  .ent {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="sky"></div>
  <div id="stage">
    <div id="centerline"></div>
    <div id="shoulder">
      <div id="buildings-left" class="buildings"></div>
      <div id="buildings-right" class="buildings"></div>
    </div>
    <div id="vlayer"></div>
    <div id="ui-layer">
      <div class="score-board">生存時間: <span id="score">0</span>s</div>
      <div id="street-sign">嘉興路</div>
    </div>
  </div>

  <!-- 開始畫面 -->
  <div id="start-screen" class="screen">
    <h1>竹北生存戰<br><span style="font-size: 28px; color: #fff;">深夜下班路</span></h1>
    <p>拖曳滑鼠或手指控制移動。<br>閃避逆向、鑽車縫的機車與三寶！<br>活下去，安全回家！</p>
    <button class="btn" id="start-btn">開始求生</button>
  </div>

  <!-- 死亡畫面 -->
  <div id="game-over-screen" class="screen hidden">
    <h1>事故發生！</h1>
    <p style="color: #ffaaaa; font-weight: bold; font-size: 22px;">你被擊落了...</p>
    <p>本次存活時間: <span id="final-score" style="color:#fff; font-weight:bold; font-size: 24px;">0</span> 秒</p>
    <button class="btn" id="restart-btn">重新超渡</button>
  </div>
</div>

<script>
// --- 核心變數與設定 (邏輯未改) ---
const FPS = 60;
const STAGE_WIDTH = document.getElementById('stage').clientWidth;
const STAGE_HEIGHT = document.getElementById('stage').clientHeight;

let gameInterval, spawnerInterval;
let scoreTimer;
let score = 0;
let isPlaying = false;
let speedMultiplier = 1; // 隨時間增加遊戲速度

let entities = []; // 存放所有車輛物件
let player = null;

// --- DOM 元素 ---
const elStage = document.getElementById('stage');
const elVlayer = document.getElementById('vlayer');
const elScore = document.getElementById('score');
const screenStart = document.getElementById('start-screen');
const screenOver = document.getElementById('game-over-screen');
const elFinalScore = document.getElementById('final-score');

// --- 顏色設定 ---
// 將汽車調亮，增加辨識度
const CAR_COLORS = ["#c0392b", "#7f8c8d", "#2980b9", "#d35400", "#27ae60", "#8e44ad"];
// 隨機店名
const SHOP_NAMES = ["新竹都城隍", "竹北特產", "工程師回收", "肝苦人現炒", "高壓變電所", "台積電特約", "金陽昌企業", "阿嬤的資源", "深夜機車行", "大都會網咖"];

// 輔助：顏色加深/變亮 (視覺處理)
function shade(color, percent) {
    let R = parseInt(color.substring(1,3),16);
    let G = parseInt(color.substring(3,5),16);
    let B = parseInt(color.substring(5,7),16);
    R = parseInt(R * (100 + percent) / 100);
    G = parseInt(G * (100 + percent) / 100);
    B = parseInt(B * (100 + percent) / 100);
    R = (R<255)?R:255;  
    G = (G<255)?G:255;  
    B = (B<255)?B:255;  
    let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
    let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
    let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
    return "#"+RR+GG+BB;
}

// --- 靜態背景繪製 (美工修改：加入路燈與右側文字修正) ---
function buildEnvironment() {
    function buildingsMarkup(isRightSide) {
        let s = `
        <defs>
          <linearGradient id="lampGlow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(255, 240, 150, 0.6)"/>
            <stop offset="100%" stop-color="rgba(255, 240, 150, 0)"/>
          </linearGradient>
        </defs>`;
        for(let i=0; i<6; i++) {
            let y = i * 110;
            let shop = {
                name: SHOP_NAMES[Math.floor(Math.random()*SHOP_NAMES.length)],
                bg: CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)],
                text: Math.random()>0.5 ? "#f1c40f" : "#ecf0f1" // 霓虹招牌字色
            };
            s += `<g transform="translate(0, ${y})">`;
            // 建築基底
            s += `<rect x="0" y="0" width="160" height="110" fill="#151515" stroke="#0a0a0a" stroke-width="2"/>`;
            // 騎樓陰影
            s += `<rect x="120" y="0" width="40" height="110" fill="#0a0a0a"/>`;
            
            // 招牌
            s += `<rect x="10" y="60" width="140" height="35" fill="${shade(shop.bg, -30)}" rx="4"/>`;
            s += `<rect x="15" y="65" width="130" height="25" fill="#111" rx="2"/>`;
            
            // 右側因為外層設定了 scaleX(-1)，為了讓字維持正向，我們使用 transform 翻轉文字回來
            if (isRightSide) {
                s += `<text x="100" y="82" transform="translate(200, 0) scale(-1, 1)" font-family="'Microsoft JhengHei', sans-serif" font-weight="900" font-size="15" fill="${shop.text}" text-anchor="middle" letter-spacing="1" style="text-shadow: 0 0 4px ${shop.text};">${shop.name}</text>`;
            } else {
                s += `<text x="80" y="82" font-family="'Microsoft JhengHei', sans-serif" font-weight="900" font-size="15" fill="${shop.text}" text-anchor="middle" letter-spacing="1" style="text-shadow: 0 0 4px ${shop.text};">${shop.name}</text>`;
            }

            // 新增：每兩棟建築架設一盞路燈
            if (i % 2 === 0) {
                s += `
                <!-- 路燈桿與燈罩 -->
                <rect x="188" y="0" width="4" height="110" fill="#2d3436"/>
                <path d="M190 20 Q195 5 215 10" stroke="#2d3436" stroke-width="4" fill="none"/>
                <path d="M205 8 L220 12 L218 16 L203 12 Z" fill="#111"/>
                <!-- 路燈燈泡與光暈 -->
                <ellipse cx="212" cy="14" rx="12" ry="5" fill="#fff" filter="drop-shadow(0 0 8px #f1c40f)"/>
                <polygon points="212,14 130,110 310,110" fill="url(#lampGlow)" opacity="0.4"/>
                `;
            }
            s += `</g>`;
        }
        // 將 svg 的 overflow 設為 visible 讓路燈光暈能自然投射到馬路上
        return `<svg viewBox="0 0 200 660" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style="position:absolute;inset:0; overflow:visible;">${s}</svg>`;
    }
    document.getElementById('buildings-left').innerHTML = buildingsMarkup(false);
    document.getElementById('buildings-right').innerHTML = buildingsMarkup(true);
}
buildEnvironment();

// --- 實體 SVG 產生器 (美工修改：調亮車體、窗戶、雨衣) ---
function vehicleSVG(type, uid) {
    let svg = '';
    if (type === 'car') {
        let c = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
        svg = `
        <svg viewBox="0 0 120 220" width="100%" height="100%" style="display:block; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));">
          <defs>
            <linearGradient id="body${uid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="${shade(c,-20)}"/>
              <stop offset="0.5" stop-color="${shade(c,40)}"/> <!-- 加亮車頂反光 -->
              <stop offset="1" stop-color="${shade(c,-10)}"/>
            </linearGradient>
            <linearGradient id="light${uid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="rgba(255, 255, 200, 0.9)"/>
              <stop offset="1" stop-color="rgba(255, 255, 200, 0)"/>
            </linearGradient>
          </defs>
          <!-- 底盤陰影 -->
          <rect x="10" y="10" width="100" height="200" rx="15" fill="rgba(0,0,0,0.7)"/>
          <!-- 輪胎 -->
          <rect x="5" y="30" width="10" height="35" rx="3" fill="#111"/>
          <rect x="105" y="30" width="10" height="35" rx="3" fill="#111"/>
          <rect x="5" y="150" width="10" height="35" rx="3" fill="#111"/>
          <rect x="105" y="150" width="10" height="35" rx="3" fill="#111"/>
          <!-- 車身 -->
          <rect x="12" y="12" width="96" height="196" rx="20" fill="url(#body${uid})"/>
          <!-- 車窗 (調亮至偏藍灰) -->
          <path d="M22 60 L98 60 L90 100 L30 100 Z" fill="#2c3e50" opacity="0.85"/>
          <path d="M30 130 L90 130 L96 180 L24 180 Z" fill="#2c3e50" opacity="0.85"/>
          <!-- 大燈光束 (血尿感車燈) -->
          <polygon points="25,12 5, -80 45, -80" fill="url(#light${uid})"/>
          <polygon points="95,12 75, -80 115, -80" fill="url(#light${uid})"/>
          <!-- 車燈本體 -->
          <rect x="18" y="12" width="18" height="8" rx="3" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
          <rect x="84" y="12" width="18" height="8" rx="3" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
          <!-- 尾燈 -->
          <rect x="20" y="200" width="20" height="6" rx="2" fill="#ff0000" filter="drop-shadow(0 0 8px #ff0000)"/>
          <rect x="80" y="200" width="20" height="6" rx="2" fill="#ff0000" filter="drop-shadow(0 0 8px #ff0000)"/>
        </svg>`;
    } else if (type === 'scooter') {
        svg = `
        <svg viewBox="0 0 120 180" width="100%" height="100%" style="display:block; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));">
           <defs>
            <linearGradient id="slight${uid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="rgba(200, 255, 255, 0.9)"/>
              <stop offset="1" stop-color="rgba(200, 255, 255, 0)"/>
            </linearGradient>
          </defs>
          <!-- 機車陰影 -->
          <ellipse cx="60" cy="118" rx="42" ry="7" fill="rgba(0,0,0,0.7)"/>
          <!-- 車頭 -->
          <circle cx="60" cy="110" r="20" fill="#34495e"/>
          <!-- 車身 -->
          <path d="M42 106 Q44 74 60 72 Q76 74 78 106Z" fill="#556b2f"/> 
          <!-- 踏板 -->
          <rect x="22" y="66" width="76" height="8" rx="4" fill="#7f8c8d"/>
          
          <!-- 超亮大燈光束 (白光/白目打鳥燈) -->
          <polygon points="60,95 20, -50 100, -50" fill="url(#slight${uid})"/>
          <!-- 大燈本體 -->
          <circle cx="60" cy="110" r="6" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/>
          
          <!-- 騎士明亮雨衣 (螢光橘/黃) -->
          <path d="M42 34 Q60 15 78 34 Q80 46 60 48 Q40 46 42 34Z" fill="#f39c12"/>
          <!-- 雨衣背部反光條 -->
          <path d="M48 38 Q60 28 72 38" stroke="#ecf0f1" stroke-width="2" fill="none"/>
          
          <!-- 騎士頭部 (亮紅色安全帽) -->
          <circle cx="60" cy="14" r="16" fill="#e74c3c"/>
          <!-- 護目鏡反光 -->
          <path d="M48 12 Q60 22 72 12" stroke="#81ecec" stroke-width="3.5" fill="none"/>
          
          <!-- 把手與騎士手臂 -->
          <path d="M30 100 Q40 60 50 40" stroke="#f39c12" stroke-width="6" stroke-linecap="round" fill="none"/>
          <path d="M90 100 Q80 60 70 40" stroke="#f39c12" stroke-width="6" stroke-linecap="round" fill="none"/>
        </svg>`;
    }
    return svg;
}

// 玩家 SVG (保持主角光環特徵)
function playerSVG() {
    return `
    <svg viewBox="0 0 120 180" width="100%" height="100%" style="display:block; filter: drop-shadow(0 10px 15px rgba(255,51,102,0.4));">
      <defs>
        <linearGradient id="plight" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(255, 51, 102, 0.8)"/>
          <stop offset="1" stop-color="rgba(255, 51, 102, 0)"/>
        </linearGradient>
      </defs>
      <ellipse cx="60" cy="118" rx="42" ry="7" fill="rgba(0,0,0,0.8)"/>
      <circle cx="60" cy="110" r="20" fill="#222"/>
      <path d="M42 106 Q44 74 60 72 Q76 74 78 106Z" fill="#222"/>
      <rect x="22" y="66" width="76" height="8" rx="4" fill="#444"/>
      
      <!-- 主角專屬血紅大燈 -->
      <polygon points="60,95 20, -50 100, -50" fill="url(#plight)"/>
      <circle cx="60" cy="110" r="6" fill="#ff3366" filter="drop-shadow(0 0 10px #ff3366)"/>
      
      <!-- 疲憊工程師外套 -->
      <path d="M42 34 Q60 15 78 34 Q80 46 60 48 Q40 46 42 34Z" fill="#34495e"/>
      <circle cx="60" cy="14" r="16" fill="#111"/>
      <!-- 安全帽發光線條 -->
      <path d="M48 10 Q60 -2 72 10" stroke="#ff3366" stroke-width="2" fill="none" filter="drop-shadow(0 0 3px #ff3366)"/>
      
      <path d="M30 100 Q40 60 50 40" stroke="#34495e" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M90 100 Q80 60 70 40" stroke="#34495e" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- 尾燈 -->
      <rect x="50" y="140" width="20" height="4" rx="2" fill="#ff0000" filter="drop-shadow(0 0 5px #ff0000)"/>
    </svg>`;
}

// --- 實體類別 (邏輯完全未改) ---
let uidCounter = 0;

class Entity {
    constructor(type, x, y, width, height, speedY) {
        this.uid = uidCounter++;
        this.type = type; 
        this.x = x; 
        this.y = y;
        this.width = width;
        this.height = height;
        this.speedY = speedY;
        this.speedX = 0;
        this.el = document.createElement('div');
        this.el.className = 'ent';
        this.el.style.width = width + 'px';
        this.el.style.height = height + 'px';
        
        if (type === 'player') {
            this.el.innerHTML = playerSVG();
        } else {
            this.el.innerHTML = vehicleSVG(type, this.uid);
        }
        
        elVlayer.appendChild(this.el);
        this.updateDOM();
    }

    updateDOM() {
        this.el.style.left = this.x + 'px';
        this.el.style.top = this.y + 'px';
    }

    remove() {
        if (this.el && this.el.parentNode) {
            this.el.parentNode.removeChild(this.el);
        }
    }

    // 碰撞邊界縮小，讓閃避容錯率較合理 (邏輯不變)
    getHitbox() {
        const paddingX = this.width * 0.25;
        const paddingY = this.height * 0.15;
        return {
            left: this.x - this.width/2 + paddingX,
            right: this.x + this.width/2 - paddingX,
            top: this.y + paddingY,
            bottom: this.y + this.height - paddingY
        };
    }
}

// --- 遊戲邏輯與控制 (邏輯完全未改) ---

function initGame() {
    elVlayer.innerHTML = '';
    entities = [];
    score = 0;
    speedMultiplier = 1;
    elScore.innerText = score;
    elStage.classList.add('moving');
    
    // 建立玩家 (置中偏下)
    player = new Entity('player', STAGE_WIDTH / 2, STAGE_HEIGHT - 150, 60, 90, 0);
    
    isPlaying = true;
    
    scoreTimer = setInterval(() => {
        score++;
        elScore.innerText = score;
        if (score % 10 === 0) {
            speedMultiplier += 0.1; // 每10秒加速
        }
    }, 1000);

    gameInterval = setInterval(gameLoop, 1000 / FPS);
    spawnerInterval = setInterval(spawnEnemy, 800);
}

function stopGame() {
    isPlaying = false;
    elStage.classList.remove('moving');
    clearInterval(gameInterval);
    clearInterval(spawnerInterval);
    clearInterval(scoreTimer);
    
    elFinalScore.innerText = score;
    screenOver.classList.remove('hidden');
}

function spawnEnemy() {
    if (!isPlaying) return;
    
    // 難度隨時間增加，產車頻率變快 (邏輯不變)
    let currentSpawnRate = Math.max(300, 800 - (speedMultiplier * 100));
    clearInterval(spawnerInterval);
    spawnerInterval = setInterval(spawnEnemy, currentSpawnRate);

    const isCar = Math.random() > 0.6; // 40% 汽車, 60% 機車
    const width = isCar ? 70 : 45;
    const height = isCar ? 130 : 70;
    
    // 隨機X位置 (限制在兩側路肩之間，路肩各約佔 34% -> 道路約 32%)
    // 為了更好玩，放寬一點可活動範圍到 20% ~ 80%
    const minX = STAGE_WIDTH * 0.25 + width/2;
    const maxX = STAGE_WIDTH * 0.75 - width/2;
    const x = minX + Math.random() * (maxX - minX);
    
    const isOpposite = Math.random() > 0.5; // 50% 機率逆向
    
    let y, speedY;
    
    // 基礎車速
    let baseSpeed = (isCar ? 4 : 6) * speedMultiplier;
    
    if (isOpposite) {
        // 逆向：從上方出現往下衝
        y = -height;
        speedY = baseSpeed * 1.5; // 逆向感覺較快 (因為與玩家相對速度)
    } else {
        // 順向：從下方出現往上鑽
        y = STAGE_HEIGHT + height;
        speedY = -baseSpeed * 0.5; // 順向速度差
    }

    let enemy = new Entity(isCar ? 'car' : 'scooter', x, y, width, height, speedY);
    
    // 三寶機車屬性：會隨機橫向漂移
    if (!isCar) {
        enemy.speedX = (Math.random() - 0.5) * 3 * speedMultiplier;
    }
    
    // 逆向的車子翻轉外觀
    if (isOpposite) {
        enemy.el.style.transform = `translateX(-50%) rotate(180deg)`;
    }

    entities.push(enemy);
}

function checkCollision(rect1, rect2) {
    return (
        rect1.left < rect2.right &&
        rect1.right > rect2.left &&
        rect1.top < rect2.bottom &&
        rect1.bottom > rect2.top
    );
}

function gameLoop() {
    if (!isPlaying) return;

    // 更新敵人位置
    for (let i = entities.length - 1; i >= 0; i--) {
        let ent = entities[i];
        
        // 漂移邏輯
        ent.x += ent.speedX;
        // 邊界反彈
        const minX = STAGE_WIDTH * 0.2 + ent.width/2;
        const maxX = STAGE_WIDTH * 0.8 - ent.width/2;
        if (ent.x < minX || ent.x > maxX) {
            ent.speedX *= -1;
            ent.x = Math.max(minX, Math.min(ent.x, maxX));
        }

        ent.y += ent.speedY;
        ent.updateDOM();

        // 碰撞判定
        if (checkCollision(player.getHitbox(), ent.getHitbox())) {
            stopGame();
            return;
        }

        // 移除超出畫面的敵人
        if (ent.y < -300 || ent.y > STAGE_HEIGHT + 300) {
            ent.remove();
            entities.splice(i, 1);
        }
    }
}

// --- 玩家操作邏輯 (邏輯完全未改) ---
let isDragging = false;
let startPointerX = 0;
let startPointerY = 0;
let startPlayerX = 0;
let startPlayerY = 0;

function pointerDown(e) {
    if (!isPlaying) return;
    isDragging = true;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startPointerX = clientX;
    startPointerY = clientY;
    startPlayerX = player.x;
    startPlayerY = player.y;
}

function pointerMove(e) {
    if (!isDragging || !isPlaying) return;
    e.preventDefault(); // 防止滾動
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    let dx = clientX - startPointerX;
    let dy = clientY - startPointerY;
    
    let newX = startPlayerX + dx;
    let newY = startPlayerY + dy;
    
    // 限制玩家活動範圍 (馬路範圍)
    const minX = STAGE_WIDTH * 0.2 + player.width/2;
    const maxX = STAGE_WIDTH * 0.8 - player.width/2;
    newX = Math.max(minX, Math.min(newX, maxX));
    newY = Math.max(player.height/2, Math.min(newY, STAGE_HEIGHT - player.height/2));
    
    player.x = newX;
    player.y = newY;
    player.updateDOM();
}

function pointerUp() {
    isDragging = false;
}

// 註冊操作事件
elStage.addEventListener('mousedown', pointerDown);
document.addEventListener('mousemove', pointerMove);
document.addEventListener('mouseup', pointerUp);

elStage.addEventListener('touchstart', pointerDown, {passive: false});
document.addEventListener('touchmove', pointerMove, {passive: false});
document.addEventListener('touchend', pointerUp);

// 按鈕事件
document.getElementById('start-btn').addEventListener('click', () => {
    screenStart.classList.add('hidden');
    initGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
    screenOver.classList.add('hidden');
    initGame();
});

// 確保調整視窗大小時環境重新繪製
window.addEventListener('resize', () => {
    if (!isPlaying) {
        buildEnvironment();
    }
});

</script>
