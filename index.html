<!--
  嘉興路行人地獄
  版本：v1.2.1
  更新：2026-07-19 — 注入純程式碼 Web Audio API 互動音效模組（背景音樂、動態引擎聲、撞擊聲），完全不改動任何原有核心邏輯與畫面美工
  v1.2.0：加入主控壓縮器/總音量（所有音源改接到這裡，避免車陣多台引擎聲同時疊加爆音）；只讓最靠近的3台車+3台機車真的發出引擎聲（其餘靜音，避免雜訊與效能負擔）；新增靜音按鈕（左上角🔊/🔇）；加入 visibilitychange 監聽，App切背景再回來時自動恢復 AudioContext
  v1.2.1：關閉機車引擎聲（太吵），機車不再生成音源節點；汽車引擎聲維持不變
-->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>嘉興路行人地獄 v1.2.1</title>
<style>
  :root{
    --sky-top: #05030a;      /* 深夜極黑紫 */
    --sky-bottom: #120b22;   /* 工業霓虹紫霧 */
    --road: #16171a;         /* 潮濕瀝青黑 */
    --road-dark: #090a0c;
    --line-yellow: #d39e00;  /* 斑駁昏黃標線 */
    --ink: #030305;
    --paper: #f5f6fa;
    --danger: #ff3333;       /* 霓虹鮮血紅 */
    --safe: #00ff66;         /* 劇毒螢光綠 */
  }
  *{
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--ink); font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    touch-action:none;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:520px; margin:0 auto;
    background:linear-gradient(var(--sky-top), var(--sky-bottom) 32%);
    overflow:hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
  }
  #skyline{position:absolute; left:0; right:0; top:10%; height:12%; opacity:.25;}
  .buildings{position:absolute; top:20%; bottom:0; width:34%; z-index:2;}
  #buildings-left{left:0;}
  #buildings-right{right:0; transform:scaleX(-1);}
  #road{
    position:absolute; left:50%; top:20%; bottom:0; width:60%;
    transform:translateX(-50%);
    background:linear-gradient(var(--road-dark) 0%, var(--road) 50%, #202226 100%);
    clip-path:polygon(38% 0%, 62% 0%, 92% 100%, 8% 100%);
  }
  #centerline{
    position:absolute; left:50%; top:0; bottom:0; width:5px; transform:translateX(-50%);
    background:repeating-linear-gradient(var(--line-yellow), var(--line-yellow) 22px, transparent 22px, transparent 40px);
    clip-path:inherit;
  }
  #shoulder{
    position:absolute; left:8%; top:20%; bottom:0; width:22%;
    clip-path:polygon(60% 0%, 100% 0%, 82% 100%, 0% 100%);
    background:linear-gradient(rgba(255,255,255,0.02), rgba(0,0,0,0.3));
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  #vlayer{position:absolute; inset:0; overflow:hidden;}
  .vehicle{position:absolute; will-change:transform; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.6));}
  .vehicle.car{ z-index:6; }

  #player{
    position:absolute; left:26%; bottom:12%; width:10%;
    transition:left .18s cubic-bezier(0.2, 0.8, 0.2, 1), transform .18s ease;
    z-index:20;
    filter:drop-shadow(0 10px 8px rgba(0,0,0,0.65));
  }
  #player.hiding{ left:12%; transform:scale(.92) rotate(-2deg); filter:drop-shadow(0 4px 4px rgba(0,0,0,0.8)); }
  #player.dashing{ animation:dashBob .25s linear infinite; }
  @keyframes dashBob{ 0%{transform:translateY(0) rotate(1deg);} 50%{transform:translateY(-5%) rotate(-1deg);} 100%{transform:translateY(0) rotate(1deg);} }
  #player.dead{ transform:rotate(92deg) translateY(15%) scale(0.9); filter:drop-shadow(0 2px 3px #000); transition:transform .3s ease-out; }

  #speedlines{position:absolute; inset:0; opacity:0; pointer-events:none; z-index:15;
    background:repeating-linear-gradient(100deg, transparent 0 25px, rgba(255,255,255,0.08) 25px 28px);
  }
  #speedlines.on{opacity:1; animation:slide .2s linear infinite;}
  @keyframes slide{ from{background-position:0 0;} to{background-position:-200px 0;} }

  #flash{position:absolute; inset:0; background:var(--danger); opacity:0; pointer-events:none; z-index:40;}
  #flash.hit{animation:flash .4s ease-out;}
  @keyframes flash{ 0%{opacity:0.8;} 100%{opacity:0;} }

  #hud{
    position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px; color:var(--paper); text-shadow:0 2px 8px rgba(0,0,0,0.9);
  }
  #hud .label{font-size:11px; letter-spacing:2px; opacity:0.8; color:#ff4d4d;}
  #hud .value{font-family:"Courier New",monospace; font-size:26px; font-weight:900;}
  #streak{position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:30;
    color:#f1c40f; font-size:13px; font-weight:bold; letter-spacing:2px; text-shadow:0 2px 5px rgba(0,0,0,0.9);}

  /* 🗺️ 嘉興路路牌樣式 */
  #street-sign {
    position: absolute;
    right: 15px;
    bottom: 130px;
    z-index: 25;
    background: #005a36;
    border: 3px solid #ffffff;
    border-radius: 4px;
    padding: 4px 10px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.8), inset 0 0 5px rgba(255,255,255,0.3);
    transform: rotate(-3deg);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
  }
  #street-sign .chinese {
    color: #ffffff;
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 3px;
  }
  #street-sign .english {
    color: #ffffff;
    font-family: Arial, sans-serif;
    font-size: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
    opacity: 0.9;
    margin-top: 1px;
  }

  #controls{
    position:absolute; bottom:0; left:0; right:0; z-index:35;
    display:flex; gap:14px; padding:16px; padding-bottom:calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,0.85) 50%);
  }
  .btn{
    flex:1; border:none; border-radius:16px; padding:16px 10px; font-size:22px; font-weight:900;
    letter-spacing:4px; color:var(--paper); font-family:inherit; position:relative;
    box-shadow:0 5px 0 rgba(0,0,0,0.6), 0 8px 10px rgba(0,0,0,0.5);
    transform:translateY(0); transition:transform .05s, box-shadow .05s;
    touch-action: manipulation;
  }
  .btn:active, .btn.pressed{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.5); }
  #btn-left{ background: linear-gradient(#00e676, #008f39); border:1px solid #007026; }
  #btn-dash{ background: linear-gradient(#ff3d00, #b21f00); border:1px solid #8a1500; }
  .btn small{ display:block; font-size:10px; letter-spacing:1px; font-weight:normal; opacity:.85; margin-top:4px; }

  .overlay{
    position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:30px;
    background:radial-gradient(circle, rgba(20,10,25,0.96) 0%, rgba(5,2,8,0.99) 100%);
    color:var(--paper);
  }
  .overlay.hidden{display:none;}
  .hidden{display:none !important;}
  .overlay h1{font-size:32px; margin:0 0 8px; letter-spacing:4px; text-shadow:0 3px 8px #000; color:#fff;}
  .overlay h1 span{color:var(--danger); text-shadow: 0 0 10px rgba(255,51,51,0.6);}
  .overlay p{font-size:14px; line-height:1.8; opacity:.8; max-width:320px; margin:8px 0 24px;}
  .overlay .big{font-family:"Courier New",monospace; font-size:56px; font-weight:900; color:#ffcc00; margin:5px 0; text-shadow:0 4px 15px rgba(255,204,0,0.4);}
  .overlay .small{font-size:13px; opacity:.6; margin-bottom:24px;}
  .startBtn{
    border:none; border-radius:24px; padding:16px 48px; font-size:18px; font-weight:900; letter-spacing:4px;
    color:#fff; background:linear-gradient(#ff3333, #b30000); box-shadow:0 5px 0 #660000;
    cursor:pointer; font-family:inherit; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .startBtn:active{transform:translateY(4px); box-shadow:none;}

  .lb-list{ width:100%; max-width:280px; margin: 4px 0 18px; }
  .lb-row{ display:flex; justify-content:space-between; align-items:center; padding:8px 12px; margin-bottom:6px;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:8px; font-size:14px; }
  .lb-row .lb-rank{ color: var(--line-yellow); font-weight:900; width:30px; text-align:left; }
  .lb-row .lb-name{ flex:1; text-align:left; padding-left:8px; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-row .lb-dist{ font-family:"Courier New",monospace; color: var(--danger); font-weight:700; }
  .lb-empty{ font-size:12px; opacity:.55; padding:10px; }
  #name-input{
    width:100%; max-width:240px; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.25);
    background:rgba(255,255,255,0.08); color:#fff; font-size:15px; text-align:center; font-family:inherit;
  }
  #name-input:focus{ outline:none; border-color: var(--line-yellow); }

  #version-tag{
    position:absolute; top:6px; right:10px; z-index:60;
    font-size:10px; letter-spacing:1px; color:rgba(255,255,255,0.35);
    font-family:"Courier New",monospace; pointer-events:none;
  }
  #mute-btn{
    position:absolute; top:4px; left:8px; z-index:60;
    width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,0.25);
    background:rgba(0,0,0,0.45); color:#fff; font-size:15px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
</style>
</head>
<body>
<div id="stage">
<div id="version-tag">v1.2.1</div>
<button id="mute-btn" aria-label="靜音切換">🔊</button>

  <svg id="skyline" viewBox="0 0 400 60" preserveAspectRatio="none">
    <rect x="0" y="20" width="40" height="40" fill="#06040a"/>
    <circle cx="15" cy="30" r="1.5" fill="#f1c40f" opacity="0.6"/>
    <circle cx="25" cy="40" r="1.5" fill="#f1c40f" opacity="0.8"/>
    <rect x="50" y="10" width="30" height="50" fill="#08060f"/>
    <rect x="55" y="15" width="5" height="5" fill="#f39c12" opacity="0.5"/>
    <rect x="95" y="25" width="25" height="35" fill="#05040a"/>
    <rect x="130" y="5" width="40" height="55" fill="#0a0814"/>
    <rect x="145" y="20" width="6" height="6" fill="#f1c40f" opacity="0.8"/>
    <rect x="155" y="35" width="6" height="6" fill="#f1c40f" opacity="0.9"/>
    <rect x="185" y="18" width="20" height="42" fill="#06050b"/>
    <rect x="220" y="12" width="35" height="48" fill="#080710"/>
    <rect x="235" y="22" width="5" height="5" fill="#f1c40f" opacity="0.7"/>
    <rect x="270" y="22" width="25" height="38" fill="#040308"/>
    <rect x="310" y="8" width="40" height="52" fill="#090713"/>
    <rect x="325" y="18" width="6" height="6" fill="#ff3333" opacity="0.8"/>
    <rect x="365" y="15" width="35" height="45" fill="#040308"/>
  </svg>

  <div class="buildings" id="buildings-left"></div>
  <div class="buildings" id="buildings-right"></div>

  <div id="road"><div id="centerline"></div></div>
  <div id="shoulder"></div>

  <div id="vlayer"></div>
  <div id="speedlines"></div>

  <div id="street-sign">
    <div class="chinese">嘉興路</div>
    <div class="english">Jiaxing Rd.</div>
  </div>

  <div id="player"></div>
  <div id="flash"></div>

  <div id="hud">
    <div>
      <div class="label">逃生距離</div>
      <div class="value" id="score">0m</div>
    </div>
  </div>
  <div id="streak"></div>

  <div id="controls">
    <button class="btn" id="btn-left">閃<small>任何時候按住＝閃避</small></button>
    <button class="btn" id="btn-dash">衝<small>按住＝往前走</small></button>
  </div>

  <div class="overlay" id="start-overlay">
    <h1>嘉興路<span>行人地獄</span></h1>
    <p>深夜加班結束...你拖著疲憊的身體走在沒有人行道的嘉興路旁。<br><br>
       前方車輛回堵正在慢慢排隊，但狂暴的機車卻瘋狂地從車縫中呼嘯而出！<br><br>
       按住「衝」往前前進，遇到高速機車時迅速按住「閃」側身躲避！</p>
    <div id="start-leaderboard-list" class="lb-list"><div class="lb-empty">讀取排行榜中…</div></div>
    <button class="startBtn" id="start-btn">開始求生</button>

  <div class="overlay hidden" id="over-overlay">
    <h1 style="color:var(--danger); text-shadow: 0 0 10px rgba(255,0,0,0.5);">下班失敗，你被撞飛了！</h1>
    <div class="big" id="final-score">0m</div>

    <div id="leaderboard-list" class="lb-list"><div class="lb-empty">讀取排行榜中…</div></div>

    <div id="name-entry" class="hidden" style="margin-bottom:16px;">
      <div style="font-size:13px; color:var(--line-yellow); margin-bottom:8px; letter-spacing:2px;">🏆 擠進前三名了！輸入你的名字</div>
      <input id="name-input" maxlength="12" placeholder="輸入名稱" autocomplete="off" />
      <button class="startBtn" id="name-submit-btn" style="margin-top:10px; padding:10px 32px; font-size:14px;">送出紀錄</button>
    </div>

    <button class="startBtn" id="retry-btn">重新超渡</button>
  </div>

</div>

<script>
(function(){
  const $ = (s)=>document.querySelector(s);
  const vlayer = $('#vlayer');
  const player = $('#player');
  const scoreEl = $('#score');
  const streakEl = $('#streak');
  const flashEl = $('#flash');
  const speedlinesEl = $('#speedlines');
  const startOverlay = $('#start-overlay');
  const overOverlay = $('#over-overlay');
  const btnLeft = $('#btn-left');
  const btnDash = $('#btn-dash');

  // ==========================================
  // 🎵 純程式碼 Web Audio API 音效合成引擎模組
  // ==========================================
  const AudioEngine = {
    ctx: null,
    bgmOsc: null,
    bgmGain: null,
    masterGain: null,
    compressor: null,
    muted: false,

    init() {
      if (this.ctx) return;
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();

      // 主控壓縮器＋總音量：所有音源都先經過這裡再輸出，避免多台車引擎聲同時疊加時爆音/破音
      this.compressor = this.ctx.createDynamicsCompressor();
      this.compressor.threshold.setValueAtTime(-24, this.ctx.currentTime);
      this.compressor.knee.setValueAtTime(30, this.ctx.currentTime);
      this.compressor.ratio.setValueAtTime(12, this.ctx.currentTime);
      this.compressor.attack.setValueAtTime(0.003, this.ctx.currentTime);
      this.compressor.release.setValueAtTime(0.25, this.ctx.currentTime);

      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.setValueAtTime(this.muted ? 0 : 1, this.ctx.currentTime);

      this.compressor.connect(this.masterGain);
      this.masterGain.connect(this.ctx.destination);

      // 切到背景/其他App再回來時，iOS常會把AudioContext停掉，回來時嘗試自動恢復
      if (!this._visHooked) {
        this._visHooked = true;
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible' && this.ctx && this.ctx.state === 'suspended') {
            this.ctx.resume().catch(()=>{});
          }
        });
      }
    },

    setMuted(m) {
      this.muted = m;
      if (this.masterGain && this.ctx) {
        this.masterGain.gain.setTargetAtTime(m ? 0 : 1, this.ctx.currentTime, 0.05);
      }
    },
    
    startBGM() {
      this.init();
      if (this.ctx.state === 'suspended') this.ctx.resume();
      if (this.bgmOsc) return;

      // 產生深夜壓迫感重低音波
      this.bgmOsc = this.ctx.createOscillator();
      const filter = this.ctx.createBiquadFilter();
      this.bgmGain = this.ctx.createGain();

      this.bgmOsc.type = 'sawtooth';
      this.bgmOsc.frequency.setValueAtTime(55, this.ctx.currentTime); // A1 低音頻

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(130, this.ctx.currentTime);

      this.bgmGain.gain.setValueAtTime(0.18, this.ctx.currentTime);

      this.bgmOsc.connect(filter);
      filter.connect(this.bgmGain);
      this.bgmGain.connect(this.compressor);

      this.bgmOsc.start();
      this.pulseFilter(filter);
    },

    pulseFilter(filter) {
      if (!this.bgmOsc || !this.ctx) return;
      try {
        const now = this.ctx.currentTime;
        // 製造迷幻低頻霓虹韻律感
        filter.frequency.setValueAtTime(110, now);
        filter.frequency.linearRampToValueAtTime(170, now + 0.35);
        filter.frequency.linearRampToValueAtTime(110, now + 0.7);
      } catch(e){}
      setTimeout(() => { if(this.bgmOsc) this.pulseFilter(filter); }, 700);
    },

    setDashing(isDashing) {
      if (!this.ctx || !this.bgmOsc) return;
      const now = this.ctx.currentTime;
      // 衝刺時拉高背景音調增強危險與速度感
      this.bgmOsc.frequency.linearRampToValueAtTime(isDashing ? 65.41 : 55, now + 0.2);
    },

    stopBGM() {
      if (this.bgmOsc) {
        try { this.bgmOsc.stop(); } catch(e){}
        this.bgmOsc.disconnect();
        this.bgmOsc = null;
      }
    },

    createEngineSound() {
      if (!this.ctx) return null;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const filter = this.ctx.createBiquadFilter();

      osc.type = 'triangle'; // 機車粗糙感波形
      osc.frequency.setValueAtTime(45, this.ctx.currentTime);

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(180, this.ctx.currentTime);

      gain.gain.setValueAtTime(0.0, this.ctx.currentTime); // 初始極遠處無聲

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(this.compressor);
      osc.start();

      return { osc, gain, filter };
    },

    updateEngineSound(nodes, prog, audible) {
      if (!this.ctx || !nodes) return;
      const now = this.ctx.currentTime;
      if (!audible) {
        // 不在「最靠近的幾台」名單內，快速淡到無聲（振盪器繼續跑但沒有聲音輸出，避免疊加雜訊）
        nodes.gain.gain.setTargetAtTime(0, now, 0.08);
        return;
      }
      // 依據 prog 進度即時模擬車輛逼近的「音量放大」與「杜普勒高頻尖銳化」
      const volume = Math.pow(prog, 3.5) * 0.45; 
      const freq = 45 + (prog * 190);
      const filterFreq = 180 + (prog * 700);

      nodes.gain.gain.setTargetAtTime(volume, now, 0.04);
      nodes.osc.frequency.setTargetAtTime(freq, now, 0.04);
      nodes.filter.frequency.setTargetAtTime(filterFreq, now, 0.04);
    },

    stopEngineSound(nodes) {
      if (!nodes) return;
      try {
        nodes.gain.gain.setValueAtTime(0, this.ctx.currentTime);
        setTimeout(() => {
          try {
            nodes.osc.stop();
            nodes.osc.disconnect();
            nodes.gain.disconnect();
            nodes.filter.disconnect();
          } catch(e){}
        }, 50);
      } catch(e){}
    },

    playCrash() {
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      const bufferSize = this.ctx.sampleRate * 0.45;
      const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      
      // 生成爆炸撞擊白噪音
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noiseNode = this.ctx.createBufferSource();
      noiseNode.buffer = buffer;

      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(280, now);
      filter.frequency.exponentialRampToValueAtTime(60, now + 0.45);

      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0.7, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);

      noiseNode.connect(filter);
      filter.connect(gain);
      gain.connect(this.compressor);
      
      noiseNode.start(now);
    }
  };

  function svgWrap(inner, vb){
    return `<svg viewBox="${vb}" width="100%" height="100%" style="overflow:visible;">${inner}</svg>`;
  }
  function shade(hex, amt){
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=(n>>8&0xff)+amt, b=(n&0xff)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  function buildingsMarkup(isRightSide){

      </defs>
    `;
    const leftShops = [
      { name: "中村深夜藝術", bg: "#150202", text: "#ff3333", stroke: "#ff3333" },
      { name: "阿明無薪加班麵", bg: "#1a1002", text: "#f39c12", stroke: "#f39c12" },
      { name: "24H爆胎機車行", bg: "#021224", text: "#00d2d3", stroke: "#00d2d3" },
      { name: "深夜地獄早午餐", bg: "#200202", text: "#ff4d4d", stroke: "#ff4d4d" },
      { name: "爆肝24H鐘錶行", bg: "#1f1f02", text: "#f1c40f", stroke: "#f1c40f" },
      { name: "九湯屋深夜拉麵", bg: "#0c0d15", text: "#ecf0f1", stroke: "#5f27cd" }
    ];
    const rightShops = [
      { name: "金陽昌 (加班中)", bg: "#101625", text: "#00a8ff", stroke: "#00a8ff" },
      { name: "超時汽車快速保養", bg: "#1c1e22", text: "#ffffff", stroke: "#95afc0" },
      { name: "建國五金深夜行", bg: "#250202", text: "#ff3838", stroke: "#f1c40f" },
      { name: "協成深夜回收廠", bg: "#021c08", text: "#2ecc71", stroke: "#2ecc71" },
      { name: "大榮深夜快遞", bg: "#1f0f02", text: "#ff9f43", stroke: "#ff9f43" },
      { name: "東陽無人工廠", bg: "#12051c", text: "#a55eea", stroke: "#a55eea" }
    ];
    
    const lampSVG = `
      <path d="M185 50 Q220 10 255 15" stroke="#111" stroke-width="4" fill="none"/>
      <rect x="245" y="11" width="25" height="8" rx="3" fill="#0a0a0a"/>
      <ellipse cx="257" cy="19" rx="8" ry="3" fill="#fff" filter="drop-shadow(0 0 10px #f1c40f)"/>
      <polygon points="257,19 100,200 414,200" fill="url(#streetLamp)" opacity="0.35"/>

    for(let i=0; i<6; i++){
      const y = i * 110;
      if(!isRightSide) {
        const shop = leftShops[i % leftShops.length];
        s += `
          <g transform="translate(0 ${y})">
            <rect x="0" y="0" width="200" height="110" fill="${i%2===0 ? '#18191d' : '#111215'}" stroke="#25262b" stroke-width="1"/>
            ${i%2===0 ?
              `<rect x="20" y="15" width="60" height="40" fill="#07080a" rx="2"/>
               <rect x="22" y="17" width="26" height="36" fill="${i%4===0 ? '#f39c12' : '#07080a'}" opacity="${i%4===0 ? '0.8' : '1'}"/>
               <rect x="52" y="17" width="26" height="36" fill="#07080a"/>
               <path d="M15 15 L85 15 L85 60 L15 60 Z" fill="none" stroke="#252a30" stroke-width="2"/>
               <path d="M38 15 L38 60 M62 15 L62 60 M15 30 L85 30 M15 45 L85 45" stroke="#252a30" stroke-width="1.5"/>` :
              `<rect x="25" y="20" width="50" height="30" fill="#07080a" rx="1"/>
               <rect x="27" y="22" width="22" height="26" fill="#00d2d3" opacity="${i%3===0 ? '0.4' : '0.05'}"/>
               <rect x="51" y="22" width="22" height="26" fill="#00d2d3" opacity="0.05"/>
               <rect x="80" y="35" width="18" height="15" fill="#1b1c20" rx="1" stroke="#252a30"/>`
            }
            ${Array.from({length:6}).map((_,k)=>`<line x1="${k*35+10}" y1="80" x2="${k*35+10}" y2="110" stroke="rgba(0,0,0,0.6)" stroke-width="2"/>`).join('')}
            <rect x="10" y="62" width="170" height="32" rx="3" fill="${shop.bg}" stroke="${shop.stroke}" stroke-width="2" style="filter: drop-shadow(0 0 5px ${shop.stroke});"/>
            <text x="95" y="84" font-family="'Microsoft JhengHei', sans-serif" font-weight="bold" font-size="14" fill="${shop.text}" text-anchor="middle" letter-spacing="1" style="text-shadow: 0 0 4px ${shop.text};">${shop.name}</text>

      } else {
        const shop = rightShops[i % rightShops.length];
        s += `

            <rect x="0" y="0" width="200" height="110" fill="${i%2===0 ? '#1d1e22' : '#141518'}" stroke="#25262b" stroke-width="1"/>
            ${Array.from({length: 10}).map((_, k) => `<line x1="${k*20}" y1="0" x2="${k*20}" y2="50" stroke="#0b0c0e" stroke-width="1.5" opacity="0.8"/>`).join('')}
            ${i%2===0 ?
              `<rect x="130" y="10" width="45" height="35" rx="3" fill="#1c1d21" stroke="#25262b" stroke-width="1.5"/>
               <circle cx="145" cy="27" r="10" fill="#07080a"/>
               <line x1="162" y1="18" x2="170" y2="18" stroke="#07080a" stroke-width="2"/>
               <line x1="162" y1="24" x2="170" y2="24" stroke="#07080a" stroke-width="2"/>
               <line x1="162" y1="30" x2="170" y2="30" stroke="#07080a" stroke-width="2"/>` :
              `<rect x="145" y="0" width="16" height="40" fill="#25262b" stroke="#07080a"/>
               <path d="M140 40 L166 40 L160 50 L146 50 Z" fill="#07080a"/>`

            <rect x="5" y="55" width="190" height="42" rx="2" fill="${shop.bg}" stroke="${shop.stroke}" stroke-width="3" style="filter: drop-shadow(0 0 5px ${shop.stroke});"/>
            <text x="100" y="82" font-family="'Microsoft JhengHei', sans-serif" font-weight="900" font-size="15" fill="${shop.text}" text-anchor="middle" letter-spacing="1" style="text-shadow: 0 0 4px ${shop.text};">${shop.name}</text>

    return `<svg viewBox="0 0 200 660" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style="position:absolute;inset:0; overflow:visible;">${s}</svg>`;
  }
  $('#buildings-left').innerHTML = buildingsMarkup(false);
  $('#buildings-right').innerHTML = buildingsMarkup(true);
  player.innerHTML = PLAYER_SVG;

  // ---------------- game state ----------------
  const STATE = { PLAYING:'playing', OVER:'over' };
  let state = STATE.OVER;
  let distance = 0;
  let vehicles = [];
  let isHiding = false;
  let isDashing = false;
  let dodgedCount = 0;
  let rafId = null;
  let lastFrameTime = 0;

  let lastCarSpawn = 0, carSpawnInterval = 1700;
  let lastScooterSpawn = 0, scooterSpawnInterval = 3200;

  let trafficMode = 'sparse';
  let modeEndAt = 0;
  function rollTrafficMode(now){
    trafficMode = Math.random() < 0.5 ? 'dense' : 'sparse';
    const modeDuration = trafficMode === 'dense'
      ? 2000 + Math.random()*2000
      : 3000 + Math.random()*4000;
    modeEndAt = now + modeDuration;
  }

  const DASH_SPEED = 13;

  function scooterDifficulty(){ return Math.min(1.35, 1 + distance/500); }

  function resetGame(){
    distance = 0; 
    vehicles.forEach(v=>{
      if(v.audioNodes) AudioEngine.stopEngineSound(v.audioNodes); // 確保重置時乾淨卸載音頻節點
      v.el.remove();
    }); 
    vehicles=[];
    dodgedCount = 0;
    scoreEl.textContent = '0m';
    streakEl.textContent = '';
    player.className = ''; isHiding = false; isDashing = false;
    state = STATE.PLAYING;
    lastCarSpawn = performance.now(); carSpawnInterval = 1000;
    lastScooterSpawn = performance.now()+800; scooterSpawnInterval = 2600;
    rollTrafficMode(performance.now());
    flashEl.className='';
    speedlinesEl.className='';
  }

  function startGame(){
    AudioEngine.startBGM(); // 開啟背景低音音樂
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    resetGame();
    lastFrameTime = performance.now();
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    if(state===STATE.OVER) return;
    state = STATE.OVER;
    
    // 遊戲結束瞬間關閉引擎與 BGM，並觸發人體撞擊聲
    vehicles.forEach(v => {
      if(v.audioNodes) AudioEngine.stopEngineSound(v.audioNodes);
    });
    AudioEngine.stopBGM();
    AudioEngine.playCrash();

    player.classList.remove('hiding','dashing');
    player.classList.add('dead');
    flashEl.classList.remove('hit'); void flashEl.offsetWidth; flashEl.classList.add('hit');
    speedlinesEl.classList.remove('on');
    const d = Math.floor(distance);
    setTimeout(()=>{
      $('#final-score').textContent = d+'m';
      overOverlay.classList.remove('hidden');
      cancelAnimationFrame(rafId);
      window.dispatchEvent(new CustomEvent('game-over-final', { detail:{ distance: d } }));
    }, 600);
  }

  const CAR_DURATION = 13000;

  function spawnCar(now){
    const el = document.createElement('div');
    el.className = 'vehicle car';
    el.innerHTML = vehicleSVG('car');
    el.style.width = '78px';
    el.style.left = '50%'; el.style.top = '18%';
    vlayer.appendChild(el);
    const laneEndX = 43 + (Math.random()*8-4);
    
    // 為排隊汽車生成沉悶的引擎低鳴聲（鋸齒波波形）
    const audioNodes = AudioEngine.createEngineSound();
    if(audioNodes && audioNodes.osc) audioNodes.osc.type = 'sawtooth';
    
    vehicles.push({ el, type:'car', spawnAt: now, duration: CAR_DURATION, laneEndX, yEnd:120, scaleEnd:1.55, audioNodes });
  }

  function spawnScooter(now){
    const speedRoll = 600 + Math.random()*4400;
    const duration = speedRoll / scooterDifficulty();
    const el = document.createElement('div');
    el.className = 'vehicle scooter';
    el.innerHTML = vehicleSVG('scooter');
    el.style.width = '58px';
    el.style.left = '50%'; el.style.top = '18%';
    vlayer.appendChild(el);
    const laneEndX = 27 + (Math.random()*6-3);

    // 機車引擎聲關閉（太吵），不生成音源節點
    const audioNodes = null;

    vehicles.push({ el, type:'scooter', spawnAt: now, duration, prog:0, resolved:false, laneEndX, yEnd:90, scaleEnd:1.4, audioNodes });
  }

  function trySpawn(now){
    if(now - lastCarSpawn >= carSpawnInterval){
      lastCarSpawn = now;
      carSpawnInterval = 950 + Math.random()*450;
      spawnCar(now);
    }
    if(now >= modeEndAt) rollTrafficMode(now);
    if(now - lastScooterSpawn >= scooterSpawnInterval/scooterDifficulty()){
      lastScooterSpawn = now;
      scooterSpawnInterval = trafficMode === 'dense'
        ? 300 + Math.random()*300
        : 1500 + Math.random()*2000;
      spawnScooter(now);
    }
  }

  const SCOOTER_MIN_GAP = 0.045;

  function updateVehicles(now, dt){
    const scooters = vehicles.filter(v=>v.type==='scooter');
    let leaderProg = 2;
    for(const v of scooters){
      v.prog = Math.min(1, v.prog + dt / v.duration);
      const fill = leaderProg - SCOOTER_MIN_GAP;
      if(v.prog > fill) v.prog = Math.max(0, fill);
      leaderProg = v.prog;
    }

    // 只讓「最靠近的幾台」汽車真的發出引擎聲，避免車陣一多、振盪器疊太多變成一團雜訊（機車引擎聲已關閉）
    const cars = vehicles.filter(v=>v.type==='car');
    const audibleSet = new Set();
    cars.map(v=>({v, p: Math.min(1, (now-v.spawnAt)/v.duration)}))
        .sort((a,b)=>b.p-a.p).slice(0,3).forEach(o=>audibleSet.add(o.v));

    for(let i=vehicles.length-1;i>=0;i--){
      const v = vehicles[i];
      let ease;
      if(v.type==='car'){
        const p = Math.min(1, (now - v.spawnAt)/v.duration);
        ease = p;
        if(v.audioNodes) AudioEngine.updateEngineSound(v.audioNodes, p, audibleSet.has(v)); // 更新排隊汽車逼近音效
      } else {
        ease = v.prog*v.prog*(3-2*v.prog);
        if(v.audioNodes) AudioEngine.updateEngineSound(v.audioNodes, v.prog, audibleSet.has(v)); // 機車音源已關閉(audioNodes為null)，此行不會執行，保留以防之後想重新開啟
      }
      const scale = 0.12 + ease*(v.scaleEnd-0.12);
      const yTop = 18;
      const y = yTop + (v.yEnd-yTop)*ease;
      const xStart = 50, xEnd = v.laneEndX;
      const x = xStart + (xEnd-xStart)*ease;
      v.el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
      v.el.style.left = x+'%';
      v.el.style.top = y+'%';
      if(v.type==='scooter') v.el.style.zIndex = 10+Math.floor(ease*10);

      if(v.type==='scooter' && !v.resolved && v.prog>=1){
        v.resolved = true;
        v.resolvedAt = now;
        resolveImpact(v);
      }
      const cleanupAt = v.type==='car' ? v.spawnAt+v.duration : (v.resolved ? v.resolvedAt+280 : null);
      if(cleanupAt!==null && now >= cleanupAt){
        if(v.audioNodes) AudioEngine.stopEngineSound(v.audioNodes); // 銷毀離開畫面車輛的音頻資源
        v.el.remove();
        vehicles.splice(i,1);
      }
    }
  }

  function resolveImpact(v){
    if(state!==STATE.PLAYING) return;
    if(isHiding){
      dodgedCount++;
      streakEl.textContent = dodgedCount>=3 ? ('連續安全閃過 x'+dodgedCount) : '';
    } else {
      endGame();
    }
  }

  function setHiding(v){
    if(state!==STATE.PLAYING) return;
    isHiding = v;
    player.classList.toggle('hiding', v);
    btnLeft.classList.toggle('pressed', v);
  }
  function setDashing(v){
    if(state!==STATE.PLAYING) return;
    isDashing = v;
    player.classList.toggle('dashing', v);
    speedlinesEl.classList.toggle('on', v);
    btnDash.classList.toggle('pressed', v);
    AudioEngine.setDashing(v); // 衝刺時即時改變 BGM 頻率
  }

  function loop(now){
    if(state===STATE.OVER) return;
    const dt = Math.min(50, now-lastFrameTime);
    lastFrameTime = now;

    trySpawn(now);
    updateVehicles(now, dt);

    if(isDashing){
      distance += DASH_SPEED * (dt/1000);
      scoreEl.textContent = Math.floor(distance)+'m';
    }
    rafId = requestAnimationFrame(loop);
  }

  function bindHold(btn, onDown, onUp){
    btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); onDown(); if(btn.setPointerCapture) btn.setPointerCapture(e.pointerId); });
    btn.addEventListener('pointerup', (e)=>{ e.preventDefault(); onUp(); });
    btn.addEventListener('pointercancel', (e)=>{ e.preventDefault(); onUp(); });
    btn.addEventListener('pointerleave', (e)=>{ e.preventDefault(); onUp(); });
  }
  bindHold(btnLeft, ()=>setHiding(true), ()=>setHiding(false));
  bindHold(btnDash, ()=>setDashing(true), ()=>setDashing(false));

  window.addEventListener('keydown', (e)=>{
    if(e.repeat) return;
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') setHiding(true);
    if(e.key==='ArrowRight' || e.key===' ' || e.key==='d' || e.key==='D') setDashing(true);
  });
  window.addEventListener('keyup', (e)=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') setHiding(false);
    if(e.key==='ArrowRight' || e.key===' ' || e.key==='d' || e.key==='D') setDashing(false);
  });

  $('#start-btn').addEventListener('click', startGame);
  $('#retry-btn').addEventListener('click', startGame);

  const muteBtn = $('#mute-btn');
  let audioMuted = false;
  muteBtn.addEventListener('click', ()=>{
    audioMuted = !audioMuted;
    AudioEngine.setMuted(audioMuted);
    muteBtn.textContent = audioMuted ? '🔇' : '🔊';
  });
})();
</script>

  let pendingDistance = null;

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function entriesFrom(data){
    const list = [];
    if(data){
      ['rank1','rank2','rank3'].forEach(k=>{ if(data[k]) list.push(data[k]); });
    }
    list.sort((a,b)=>b.distance-a.distance);
    return list;
  }

  function renderLeaderboard(data){
    const entries = entriesFrom(data);
    const html = entries.length
      ? entries.map((e,i)=>`<div class="lb-row"><span class="lb-rank">#${i+1}</span><span class="lb-name">${escapeHtml(e.name)}</span><span class="lb-dist">${Math.floor(e.distance)}m</span></div>`).join('')
      : `<div class="lb-empty">還沒有人上榜，成為第一個吧</div>`;
    listEl.innerHTML = html;
    startListEl.innerHTML = html;
    return entries;
  }

  async function loadLeaderboard(){
    try{
      const snap = await get(lbRef);
      return renderLeaderboard(snap.val());
    }catch(err){
      const errHtml = `<div class="lb-empty">排行榜讀取失敗：${escapeHtml(err && err.message ? err.message : '未知錯誤')}</div>`;
      listEl.innerHTML = errHtml;
      startListEl.innerHTML = errHtml;
      return null;
    }
  }

  function qualifies(entries, distance){
    if(entries===null) return false;
    if(entries.length < 3) return true;
    const min = Math.min(...entries.map(e=>e.distance));
    return distance > min;
  }

  let latestGameOverToken = 0;

  window.addEventListener('game-over-final', async (e)=>{
    const myToken = ++latestGameOverToken;
    const distance = e.detail.distance;
    entryEl.classList.add('hidden');
    listEl.innerHTML = `<div class="lb-empty">讀取排行榜中…</div>`;
    const entries = await loadLeaderboard();
    if(myToken !== latestGameOverToken) return;
    if(distance>0 && qualifies(entries, distance)){
      pendingDistance = distance;
      entryEl.classList.remove('hidden');
      inputEl.value = '';
      setTimeout(()=>inputEl.focus(), 50);
    }
  });

  async function submitScore(){
    const name = (inputEl.value||'').trim().slice(0,12) || '匿名路人';
    const distance = pendingDistance;
    if(distance==null) return;
    submitBtn.disabled = true;
    submitBtn.textContent = '送出中…';
    try{
      const result = await runTransaction(lbRef, (current)=>{
        const list = entriesFrom(current);
        list.push({ name, distance });
        list.sort((a,b)=>b.distance-a.distance);
        const top3 = list.slice(0,3);
        const out = {};
        top3.forEach((entry,i)=>{ out['rank'+(i+1)] = { name: entry.name, distance: entry.distance }; });
        return out;
      });
      const finalData = result && result.snapshot ? result.snapshot.val() : null;
      const madeIt = !!finalData && Object.values(finalData).some(e => e && e.name===name && e.distance===distance);
      entryEl.classList.add('hidden');
      await loadLeaderboard();
      if(!madeIt){
        alert('可惜，送出的這個瞬間前三名剛好被別人的紀錄擠掉了，這次沒有真的上榜。');
      }
    }catch(err){
      alert('上傳失敗：' + (err && err.message ? err.message : '未知錯誤') + '\n（若顯示 Permission denied，代表 Firebase Rules 還沒設定好，不是網路問題）');
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = '送出紀錄';
    }
  }
  submitBtn.addEventListener('click', submitScore);
  inputEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitScore(); });

  loadLeaderboard();
</script>
</body>
</html>
