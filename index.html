<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>嘉興路行人地獄</title>
<style>
  :root{
    --sky-top: #b0bfc9;
    --sky-bottom: #dfe4e7;
    --road: #46484a;
    --road-dark: #353738;
    --line-yellow: #f1c40f;
    --ink: #1e2522;
    --paper: #f5f6fa;
    --danger: #c0392b;
    --safe: #27ae60;
  }
  *{
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--ink); font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    touch-action:none;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:520px; margin:0 auto;
    background:linear-gradient(var(--sky-top), var(--sky-bottom) 32%);
    overflow:hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
  #skyline{position:absolute; left:0; right:0; top:10%; height:12%; opacity:.4;}
  .buildings{position:absolute; top:20%; bottom:0; width:34%; z-index:2;}
  #buildings-left{left:0;}
  #buildings-right{right:0; transform:scaleX(-1);}
  #road{
    position:absolute; left:50%; top:20%; bottom:0; width:60%;
    transform:translateX(-50%);
    background:linear-gradient(var(--road-dark) 0%, var(--road) 50%, #555759 100%);
    clip-path:polygon(38% 0%, 62% 0%, 92% 100%, 8% 100%);
  }
  #centerline{
    position:absolute; left:50%; top:0; bottom:0; width:5px; transform:translateX(-50%);
    background:repeating-linear-gradient(var(--line-yellow), var(--line-yellow) 22px, transparent 22px, transparent 40px);
    clip-path:inherit;
  }
  #shoulder{
    position:absolute; left:8%; top:20%; bottom:0; width:22%;
    clip-path:polygon(60% 0%, 100% 0%, 82% 100%, 0% 100%);
    background:linear-gradient(rgba(255,255,255,0.05), rgba(0,0,0,0.15));
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  #vlayer{position:absolute; inset:0; overflow:hidden;}
  .vehicle{position:absolute; will-change:transform; filter:drop-shadow(0 6px 8px rgba(0,0,0,0.35));}
  .vehicle.car{ z-index:6; } /* cars are background traffic, always behind the danger layer */

  #player{
    position:absolute; left:26%; bottom:12%; width:10%;
    transition:left .18s cubic-bezier(0.2, 0.8, 0.2, 1), transform .18s ease;
    z-index:20;
    filter:drop-shadow(0 10px 6px rgba(0,0,0,0.35));
  }
  #player.hiding{ left:12%; transform:scale(.92) rotate(-2deg); filter:drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
  #player.dashing{ animation:dashBob .25s linear infinite; }
  @keyframes dashBob{ 0%{transform:translateY(0) rotate(1deg);} 50%{transform:translateY(-5%) rotate(-1deg);} 100%{transform:translateY(0) rotate(1deg);} }
  #player.dead{ transform:rotate(92deg) translateY(15%) scale(0.9); filter:drop-shadow(0 2px 3px #000); transition:transform .3s ease-out; }

  #speedlines{position:absolute; inset:0; opacity:0; pointer-events:none; z-index:15;
    background:repeating-linear-gradient(100deg, transparent 0 25px, rgba(255,255,255,0.12) 25px 28px);
  }
  #speedlines.on{opacity:1; animation:slide .2s linear infinite;}
  @keyframes slide{ from{background-position:0 0;} to{background-position:-200px 0;} }

  #flash{position:absolute; inset:0; background:var(--danger); opacity:0; pointer-events:none; z-index:40;}
  #flash.hit{animation:flash .4s ease-out;}
  @keyframes flash{ 0%{opacity:0.8;} 100%{opacity:0;} }

  #hud{
    position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px; color:var(--paper); text-shadow:0 2px 6px rgba(0,0,0,0.7);
  }
  #hud .label{font-size:11px; letter-spacing:2px; opacity:0.8;}
  #hud .value{font-family:"Courier New",monospace; font-size:26px; font-weight:900;}
  #streak{position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:30;
    color:#f1c40f; font-size:13px; font-weight:bold; letter-spacing:2px; text-shadow:0 2px 5px rgba(0,0,0,0.8);}

  #controls{
    position:absolute; bottom:0; left:0; right:0; z-index:35;
    display:flex; gap:14px; padding:16px; padding-bottom:calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,0.65) 70%);
  }
  .btn{
    flex:1; border:none; border-radius:16px; padding:16px 10px; font-size:22px; font-weight:900;
    letter-spacing:4px; color:var(--paper); font-family:inherit; position:relative;
    box-shadow:0 5px 0 rgba(0,0,0,0.4), 0 8px 10px rgba(0,0,0,0.3);
    transform:translateY(0); transition:transform .05s, box-shadow .05s;
    touch-action: manipulation;
  }
  .btn:active, .btn.pressed{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3); }
  #btn-left{ background: linear-gradient(#2ecc71, var(--safe)); border:1px solid #27ae60; }
  #btn-dash{ background: linear-gradient(#e74c3c, var(--danger)); border:1px solid #c0392b; }
  .btn small{ display:block; font-size:10px; letter-spacing:1px; font-weight:normal; opacity:.85; margin-top:4px; }

  .overlay{
    position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:30px;
    background:radial-gradient(circle, rgba(30,30,35,0.85) 0%, rgba(10,10,12,0.95) 100%);
    color:var(--paper);
  }
  .overlay.hidden{display:none;}
  .overlay h1{font-size:32px; margin:0 0 8px; letter-spacing:4px; text-shadow:0 3px 6px #000;}
  .overlay h1 span{color:var(--line-yellow);}
  .overlay p{font-size:14px; line-height:1.8; opacity:.85; max-width:320px; margin:8px 0 24px;}
  .overlay .big{font-family:"Courier New",monospace; font-size:56px; font-weight:900; color:var(--line-yellow); margin:5px 0; text-shadow:0 4px 10px rgba(0,0,0,0.5);}
  .overlay .small{font-size:13px; opacity:.6; margin-bottom:24px;}
  .startBtn{
    border:none; border-radius:24px; padding:16px 48px; font-size:18px; font-weight:900; letter-spacing:4px;
    color:#fff; background:linear-gradient(#e74c3c, #c0392b); box-shadow:0 5px 0 #7f2d21;
    cursor:pointer; font-family:inherit;
  }
  .startBtn:active{transform:translateY(4px); box-shadow:none;}
</style>
</head>
<body>
<div id="stage">

  <svg id="skyline" viewBox="0 0 400 60" preserveAspectRatio="none">
    <rect x="0" y="20" width="40" height="40" fill="#7f8c8d"/>
    <rect x="50" y="10" width="30" height="50" fill="#95a5a6"/>
    <rect x="95" y="25" width="25" height="35" fill="#7f8c8d"/>
    <rect x="130" y="5" width="40" height="55" fill="#bdc3c7"/>
    <rect x="185" y="18" width="20" height="42" fill="#7f8c8d"/>
    <rect x="220" y="12" width="35" height="48" fill="#95a5a6"/>
    <rect x="270" y="22" width="25" height="38" fill="#7f8c8d"/>
    <rect x="310" y="8" width="40" height="52" fill="#bdc3c7"/>
    <rect x="365" y="15" width="35" height="45" fill="#7f8c8d"/>
  </svg>

  <div class="buildings" id="buildings-left"></div>
  <div class="buildings" id="buildings-right"></div>

  <div id="road"><div id="centerline"></div></div>
  <div id="shoulder"></div>

  <div id="vlayer"></div>
  <div id="speedlines"></div>

  <div id="player"></div>
  <div id="flash"></div>

  <div id="hud">
    <div>
      <div class="label">距離</div>
      <div class="value" id="score">0m</div>
    </div>
    <div style="text-align:right">
      <div class="label">最佳紀錄</div>
      <div class="value" id="best">0m</div>
    </div>
  </div>
  <div id="streak"></div>

  <div id="controls">
    <button class="btn" id="btn-left">閃<small>任何時候按住＝閃避</small></button>
    <button class="btn" id="btn-dash">衝<small>按住＝往前走</small></button>
  </div>

  <div class="overlay" id="start-overlay">
    <h1>嘉興路<span>行人地獄</span></h1>
    <p>汽車在塞車，慢慢排隊經過，不會撞到你，純粹擋視線。<br><br>
       真正的威脅是機車——速度快、頻率較低但說來就來。<br>
       按住「衝」往前走，放開就停下；「閃」隨時都能按，按住＝側身躲開迎面而來的機車。</p>
    <button class="startBtn" id="start-btn">開始體驗</button>
  </div>

  <div class="overlay hidden" id="over-overlay">
    <h1 style="color:var(--danger)">你被撞飛了！</h1>
    <div class="big" id="final-score">0m</div>
    <div class="small" id="best-note"></div>
    <button class="startBtn" id="retry-btn">再試一次</button>
  </div>

</div>

<script>
(function(){
  const $ = (s)=>document.querySelector(s);
  const vlayer = $('#vlayer');
  const player = $('#player');
  const scoreEl = $('#score');
  const bestEl = $('#best');
  const streakEl = $('#streak');
  const flashEl = $('#flash');
  const speedlinesEl = $('#speedlines');
  const startOverlay = $('#start-overlay');
  const overOverlay = $('#over-overlay');
  const btnLeft = $('#btn-left');
  const btnDash = $('#btn-dash');

  let bestScore = 0;

  function svgWrap(inner, vb){
    return `<svg viewBox="${vb}" width="100%" height="100%" style="overflow:visible;">${inner}</svg>`;
  }
  function shade(hex, amt){
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=(n>>8&0xff)+amt, b=(n&0xff)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }

  const PLAYER_SVG = svgWrap(`
    <ellipse cx="30" cy="92" rx="15" ry="5" fill="rgba(0,0,0,0.25)"/>
    <path d="M18 92 L21 52 Q22 38 30 38 Q38 38 39 52 L42 92 Z" fill="#2c3e50"/>
    <circle cx="30" cy="24" r="11" fill="#f3a683"/>
    <path d="M18 20 Q30 5 42 20 Q40 11 30 10 Q20 11 18 20Z" fill="#1e272e"/>
    <rect x="11" y="48" width="7" height="22" rx="3" fill="#f3a683"/>
    <rect x="42" y="48" width="7" height="22" rx="3" fill="#f3a683"/>
  `, "0 0 60 105");

  const CAR_COLORS = ["#c0392b","#ffffff","#2c3e50","#2980b9","#7f8c8d"];
  let vehicleUid = 0;

  function vehicleSVG(type){
    const uid = 'v'+(vehicleUid++);
    if(type==='car'){
      const c = CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)];
      return svgWrap(`
        <defs>
          <linearGradient id="body${uid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="${shade(c,-20)}"/>
            <stop offset="0.5" stop-color="${c}"/>
            <stop offset="1" stop-color="${shade(c,20)}"/>
          </linearGradient>
        </defs>
        <ellipse cx="80" cy="102" rx="64" ry="7" fill="rgba(0,0,0,0.3)"/>
        <path d="M12 90 L16 46 Q20 16 60 12 L100 12 Q140 16 144 46 L148 90 Z" fill="url(#body${uid})"/>
        <path d="M32 46 Q38 24 62 22 L98 22 Q122 24 128 47 Z" fill="#2c3e50" opacity="0.85"/>
        <circle cx="34" cy="90" r="16" fill="#111"/>
        <circle cx="126" cy="90" r="16" fill="#111"/>
        <circle cx="28" cy="62" r="9" fill="#f1c40f"/>
        <circle cx="132" cy="62" r="9" fill="#f1c40f"/>
        <rect x="58" y="82" width="44" height="10" rx="2" fill="#ecf0f1"/>
      `, "0 0 160 110");
    }
    return svgWrap(`
      <ellipse cx="60" cy="118" rx="42" ry="7" fill="rgba(0,0,0,0.3)"/>
      <circle cx="60" cy="110" r="20" fill="#111"/>
      <path d="M42 106 Q44 74 60 72 Q76 74 78 106Z" fill="#222"/>
      <rect x="22" y="66" width="76" height="8" rx="4" fill="#333"/>
      <circle cx="60" cy="62" r="12" fill="#f1c40f"/>
      <circle cx="60" cy="62" r="5" fill="#fff"/>
      <path d="M42 34 Q60 15 78 34 Q80 46 60 48 Q40 46 42 34Z" fill="#2c3e50"/>
      <circle cx="60" cy="14" r="16" fill="#f1c40f"/>
      <path d="M45 14 Q60 -4 75 14 Z" fill="#111"/>
      <path d="M48 15 Q60 24 72 15 L70 22 Q60 27 50 22Z" fill="#34495e"/>
    `, "0 -10 120 130");
  }

  function buildingsMarkup(isRightSide){
    let s = '';
    const leftShops = [
      { name: "中村藝術中心", bg: "#8b0000", text: "#ffffff", stroke: "#5e0000" },
      { name: "阿明傳統滷肉飯", bg: "#f39c12", text: "#000000", stroke: "#e67e22" },
      { name: "正港機車行", bg: "#2980b9", text: "#ffffff", stroke: "#2574a9" },
      { name: "美而美早午餐", bg: "#e74c3c", text: "#f1c40f", stroke: "#c0392b" },
      { name: "寶島鐘錶眼鏡", bg: "#f1c40f", text: "#c0392b", stroke: "#e67e22" },
      { name: "九湯屋拉麵", bg: "#2c3e50", text: "#ecf0f1", stroke: "#1a252f" }
    ];
    const rightShops = [
      { name: "金陽昌企業", bg: "#ffffff", text: "#2980b9", stroke: "#f1c40f" },
      { name: "宏達汽車保養", bg: "#34495e", text: "#ffffff", stroke: "#bdc3c7" },
      { name: "建國五金行", bg: "#c0392b", text: "#ffffff", stroke: "#f1c40f" },
      { name: "協成資源回收", bg: "#27ae60", text: "#ffffff", stroke: "#2ecc71" },
      { name: "大榮貨運倉儲", bg: "#f39c12", text: "#ffffff", stroke: "#d35400" },
      { name: "東陽精密機械", bg: "#8e44ad", text: "#ffffff", stroke: "#9b59b6" }
    ];
    for(let i=0; i<6; i++){
      const y = i * 110;
      if(!isRightSide) {
        const shop = leftShops[i % leftShops.length];
        s += `
          <g transform="translate(0 ${y})">
            <rect x="0" y="0" width="200" height="110" fill="${i%2===0 ? '#a6b0b3' : '#bdc3c7'}" stroke="#7f8c8d" stroke-width="1"/>
            ${i%2===0 ?
              `<rect x="20" y="15" width="60" height="40" fill="#2c3e50" rx="2"/>
               <rect x="22" y="17" width="26" height="36" fill="#34495e"/>
               <rect x="52" y="17" width="26" height="36" fill="#34495e"/>
               <path d="M15 15 L85 15 L85 60 L15 60 Z" fill="none" stroke="#bdc3c7" stroke-width="2"/>
               <path d="M38 15 L38 60 M62 15 L62 60 M15 30 L85 30 M15 45 L85 45" stroke="#bdc3c7" stroke-width="1.5"/>` :
              `<rect x="25" y="20" width="50" height="30" fill="#34495e" rx="1"/>
               <rect x="27" y="22" width="22" height="26" fill="#81ecec" opacity="0.4"/>
               <rect x="51" y="22" width="22" height="26" fill="#81ecec" opacity="0.4"/>
               <rect x="80" y="35" width="18" height="15" fill="#ecf0f1" rx="1" stroke="#95a5a6"/>`
            }
            ${Array.from({length:6}).map((_,k)=>`<line x1="${k*35+10}" y1="80" x2="${k*35+10}" y2="110" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>`).join('')}
            <rect x="10" y="62" width="170" height="32" rx="3" fill="${shop.bg}" stroke="${shop.stroke}" stroke-width="2"/>
            <text x="95" y="84" font-family="'Microsoft JhengHei', sans-serif" font-weight="bold" font-size="16" fill="${shop.text}" text-anchor="middle" letter-spacing="1">${shop.name}</text>
          </g>
        `;
      } else {
        const shop = rightShops[i % rightShops.length];
        s += `
          <g transform="translate(0 ${y})">
            <rect x="0" y="0" width="200" height="110" fill="${i%2===0 ? '#dcdde1' : '#ced6e0'}" stroke="#bdc3c7" stroke-width="1"/>
            ${Array.from({length: 10}).map((_, k) => `<line x1="${k*20}" y1="0" x2="${k*20}" y2="50" stroke="#718093" stroke-width="1" opacity="0.3"/>`).join('')}
            ${i%2===0 ?
              `<rect x="130" y="10" width="45" height="35" rx="3" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5"/>
               <circle cx="145" cy="27" r="10" fill="#2c3e50"/>
               <line x1="162" y1="18" x2="170" y2="18" stroke="#7f8c8d" stroke-width="2"/>
               <line x1="162" y1="24" x2="170" y2="24" stroke="#7f8c8d" stroke-width="2"/>
               <line x1="162" y1="30" x2="170" y2="30" stroke="#7f8c8d" stroke-width="2"/>` :
              `<rect x="145" y="0" width="16" height="40" fill="#95a5a6" stroke="#7f8c8d"/>
               <path d="M140 40 L166 40 L160 50 L146 50 Z" fill="#7f8c8d"/>`
            }
            <rect x="5" y="55" width="190" height="42" rx="2" fill="${shop.bg}" stroke="${shop.stroke}" stroke-width="4"/>
            <text x="100" y="82" font-family="'Microsoft JhengHei', sans-serif" font-weight="900" font-size="18" fill="${shop.text}" text-anchor="middle" letter-spacing="1">${shop.name}</text>
            <rect x="0" y="97" width="200" height="13" fill="rgba(0,0,0,0.15)"/>
          </g>
        `;
      }
    }
    return `<svg viewBox="0 0 200 660" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style="position:absolute;inset:0;">${s}</svg>`;
  }
  $('#buildings-left').innerHTML = buildingsMarkup(false);
  $('#buildings-right').innerHTML = buildingsMarkup(true);
  player.innerHTML = PLAYER_SVG;

  // ---------------- game state ----------------
  const STATE = { PLAYING:'playing', OVER:'over' };
  let state = STATE.OVER;
  let distance = 0;
  let vehicles = [];
  let isHiding = false;
  let isDashing = false;
  let dodgedCount = 0;
  let rafId = null;
  let lastFrameTime = 0;

  // two independent traffic tracks
  let lastCarSpawn = 0, carSpawnInterval = 1700;
  let lastScooterSpawn = 0, scooterSpawnInterval = 3200;

  const DASH_SPEED = 13; // m/s while holding 衝

  function scooterDifficulty(){ return Math.min(1.35, 1 + distance/500); }

  function resetGame(){
    distance = 0; vehicles.forEach(v=>v.el.remove()); vehicles=[];
    dodgedCount = 0;
    scoreEl.textContent = '0m';
    streakEl.textContent = '';
    player.className = ''; isHiding = false; isDashing = false;
    state = STATE.PLAYING;
    lastCarSpawn = performance.now(); carSpawnInterval = 1000;
    lastScooterSpawn = performance.now()+800; scooterSpawnInterval = 2600;
    flashEl.className='';
    speedlinesEl.className='';
  }

  function startGame(){
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    resetGame();
    lastFrameTime = performance.now();
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    if(state===STATE.OVER) return;
    state = STATE.OVER;
    player.classList.remove('hiding','dashing');
    player.classList.add('dead');
    flashEl.classList.remove('hit'); void flashEl.offsetWidth; flashEl.classList.add('hit');
    speedlinesEl.classList.remove('on');
    const d = Math.floor(distance);
    bestScore = Math.max(bestScore, d);
    bestEl.textContent = bestScore+'m';
    setTimeout(()=>{
      $('#final-score').textContent = d+'m';
      $('#best-note').textContent = d>=bestScore ? '🎉 創下新紀錄！' : ('最佳紀錄 '+bestScore+'m');
      overOverlay.classList.remove('hidden');
      cancelAnimationFrame(rafId);
    }, 600);
  }

  const CAR_DURATION = 13000; // fixed & identical for every car — guarantees no overtaking, and 2x slower than before

  function spawnCar(now){
    const el = document.createElement('div');
    el.className = 'vehicle car';
    el.innerHTML = vehicleSVG('car');
    el.style.width = '112px';
    el.style.left = '50%'; el.style.top = '18%';
    vlayer.appendChild(el);
    const laneEndX = 40 + (Math.random()*10-5); // cars stay more central — never actually reach the pedestrian's lane
    vehicles.push({ el, type:'car', spawnAt: now, duration: CAR_DURATION, laneEndX, yEnd:128, scaleEnd:2.5 });
  }

  function spawnScooter(now){
    // speed roll: independent random value — some scooters crawl, some blast past
    const speedRoll = 1300 + Math.random()*1500; // 1300~2800ms base duration
    const duration = speedRoll / scooterDifficulty();
    const el = document.createElement('div');
    el.className = 'vehicle scooter';
    el.innerHTML = vehicleSVG('scooter');
    el.style.width = '70px';
    el.style.left = '50%'; el.style.top = '18%';
    vlayer.appendChild(el);
    const laneEndX = 28 + (Math.random()*6-3); // hugs the shoulder edge — the real threat
    vehicles.push({ el, type:'scooter', spawnAt: now, duration, prog:0, resolved:false, laneEndX, yEnd:90, scaleEnd:1.6 });
  }

  function trySpawn(now){
    if(now - lastCarSpawn >= carSpawnInterval){
      lastCarSpawn = now;
      carSpawnInterval = 950 + Math.random()*450; // interval scaled up with the doubled duration to keep the same jam density
      spawnCar(now);
    }
    if(now - lastScooterSpawn >= scooterSpawnInterval/scooterDifficulty()){
      lastScooterSpawn = now;
      // frequency roll: independent random value — sometimes bunched, sometimes a long empty gap
      scooterSpawnInterval = 1600 + Math.random()*4600; // 1.6~6.2s
      spawnScooter(now);
    }
  }

  const SCOOTER_MIN_GAP = 0.045; // how far behind the leader a blocked scooter must stay (in progress units)

  function updateVehicles(now, dt){
    // follow-the-leader: scooters can never pass an earlier-spawned scooter still on screen
    const scooters = vehicles.filter(v=>v.type==='scooter'); // already in spawn order
    let leaderProg = 2; // sentinel: the frontmost scooter has no one to be blocked by
    for(const v of scooters){
      v.prog = Math.min(1, v.prog + dt / v.duration);
      const cap = leaderProg - SCOOTER_MIN_GAP;
      if(v.prog > cap) v.prog = Math.max(0, cap);
      leaderProg = v.prog;
    }

    for(let i=vehicles.length-1;i>=0;i--){
      const v = vehicles[i];
      let ease;
      if(v.type==='car'){
        const p = Math.min(1, (now - v.spawnAt)/v.duration);
        ease = p; // strictly linear/uniform speed so none can overtake another
      } else {
        ease = v.prog*v.prog*(3-2*v.prog); // smoothstep of the (possibly blocked) progress
      }
      const scale = 0.12 + ease*(v.scaleEnd-0.12);
      const yTop = 18;
      const y = yTop + (v.yEnd-yTop)*ease;
      const xStart = 50, xEnd = v.laneEndX;
      const x = xStart + (xEnd-xStart)*ease;
      v.el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
      v.el.style.left = x+'%';
      v.el.style.top = y+'%';
      if(v.type==='scooter') v.el.style.zIndex = 10+Math.floor(ease*10);

      if(v.type==='scooter' && !v.resolved && v.prog>=1){
        v.resolved = true;
        v.resolvedAt = now;
        resolveImpact(v);
      }
      const cleanupAt = v.type==='car' ? v.spawnAt+v.duration : (v.resolved ? v.resolvedAt+280 : null);
      if(cleanupAt!==null && now >= cleanupAt){
        v.el.remove();
        vehicles.splice(i,1);
      }
    }
  }

  // only scooters can ever hit the player — cars are just slow-moving traffic-jam background
  function resolveImpact(v){
    if(state!==STATE.PLAYING) return;
    if(isHiding){
      dodgedCount++;
      streakEl.textContent = dodgedCount>=3 ? ('連續安全閃過 x'+dodgedCount) : '';
    } else {
      endGame();
    }
  }

  function setHiding(v){
    if(state!==STATE.PLAYING) return;
    isHiding = v;
    player.classList.toggle('hiding', v);
    btnLeft.classList.toggle('pressed', v);
  }
  function setDashing(v){
    if(state!==STATE.PLAYING) return;
    isDashing = v;
    player.classList.toggle('dashing', v);
    speedlinesEl.classList.toggle('on', v);
    btnDash.classList.toggle('pressed', v);
  }

  function loop(now){
    if(state===STATE.OVER) return;
    const dt = Math.min(50, now-lastFrameTime);
    lastFrameTime = now;

    trySpawn(now);
    updateVehicles(now, dt);

    if(isDashing){
      distance += DASH_SPEED * (dt/1000);
      scoreEl.textContent = Math.floor(distance)+'m';
    }
    rafId = requestAnimationFrame(loop);
  }

  function bindHold(btn, onDown, onUp){
    btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); onDown(); if(btn.setPointerCapture) btn.setPointerCapture(e.pointerId); });
    btn.addEventListener('pointerup', (e)=>{ e.preventDefault(); onUp(); });
    btn.addEventListener('pointercancel', (e)=>{ e.preventDefault(); onUp(); });
    btn.addEventListener('pointerleave', (e)=>{ e.preventDefault(); onUp(); });
  }
  bindHold(btnLeft, ()=>setHiding(true), ()=>setHiding(false));
  bindHold(btnDash, ()=>setDashing(true), ()=>setDashing(false));

  window.addEventListener('keydown', (e)=>{
    if(e.repeat) return;
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') setHiding(true);
    if(e.key==='ArrowRight' || e.key===' ' || e.key==='d' || e.key==='D') setDashing(true);
  });
  window.addEventListener('keyup', (e)=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') setHiding(false);
    if(e.key==='ArrowRight' || e.key===' ' || e.key==='d' || e.key==='D') setDashing(false);
  });

  $('#start-btn').addEventListener('click', startGame);
  $('#retry-btn').addEventListener('click', startGame);
})();
</script>
</body>
</html>
