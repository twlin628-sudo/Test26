<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>嘉興路行人地獄 - 傍晚重製版</title>
<style>
  :root{
    /* 🌆 傍晚尖峰時刻色系 */
    --sky-top: #1a1025;      /* 夜幕紫 */
    --sky-bottom: #d95a53;   /* 夕陽橘紅 */
    --road: #3a3b40;         /* 柏油路基底 */
    --road-dark: #1e1e24;    /* 遠方幽暗馬路 */
    --line-yellow: #ffcc00;  /* 螢光雙黃線 */
    --shutter-cream: #2d3436;/* 鐵門暗灰 */
    --shutter-red: #d63031;  /* 招牌紅 */
    --sign-blue: #0984e3;    /* 招牌藍 */
    --ink: #000000;
    --paper: #f5f6fa;
    --danger: #e84118;
    --safe: #00b894;
    --shadow: rgba(0, 0, 0, 0.6);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--ink); font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    touch-action:none; user-select:none;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:520px; margin:0 auto;
    background:linear-gradient(var(--sky-top), var(--sky-bottom) 32%);
    overflow:hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.8) inset;
  }
  svg.defs{position:absolute; width:0; height:0;}
  
  /* 城市天際線微光 */
  #skyline{position:absolute; left:0; right:0; top:8%; height:14%; opacity:.8;}
  
  .buildings{position:absolute; top:20%; bottom:0; width:34%; z-index:2;}
  #buildings-left{left:0;}
  #buildings-right{right:0; transform:scaleX(-1);}
  
  /* 馬路透視與漸層 */
  #road{
    position:absolute; left:50%; top:20%; bottom:0; width:60%;
    transform:translateX(-50%);
    background:linear-gradient(var(--road-dark) 0%, var(--road) 60%, #4a4b50 100%);
    clip-path:polygon(38% 0%, 62% 0%, 92% 100%, 8% 100%);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  }
  #centerline{
    position:absolute; left:50%; top:0; bottom:0; width:4px; transform:translateX(-50%);
    background:repeating-linear-gradient(var(--line-yellow), var(--line-yellow) 24px, transparent 24px, transparent 40px);
    clip-path:inherit;
    filter: drop-shadow(0 0 4px rgba(255, 204, 0, 0.6));
  }
  #shoulder{
    position:absolute; left:8%; top:20%; bottom:0; width:22%;
    clip-path:polygon(60% 0%, 100% 0%, 82% 100%, 0% 100%);
    background:linear-gradient(rgba(255,255,255,0.02), rgba(0,0,0,0.3));
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  
  #vlayer{position:absolute; inset:0; overflow:hidden;}
  .vehicle{position:absolute; will-change:transform; filter:drop-shadow(0 8px 12px var(--shadow));}

  #shelter{
    position:absolute; left:4%; bottom:15%; width:23%;
    transform-origin:bottom center;
    transition:transform .18s ease;
    filter:drop-shadow(0 10px 10px rgba(0,0,0,0.7));
  }

  /* 玩家加上微光陰影 */
  #player{
    position:absolute; left:26%; bottom:12%; width:10%;
    transition:left .2s cubic-bezier(0.2, 0.8, 0.2, 1), transform .2s ease;
    z-index:20;
    filter:drop-shadow(0 15px 8px rgba(0,0,0,0.5));
  }
  #player.hiding{ left:12%; transform:scale(.9) rotate(-3deg); filter:drop-shadow(0 5px 4px rgba(0,0,0,0.8)); }
  #player.dashing{ animation:dashBob .3s linear infinite; }
  @keyframes dashBob{ 0%{transform:translateY(0) rotate(2deg);} 50%{transform:translateY(-6%) rotate(-2deg);} 100%{transform:translateY(0) rotate(2deg);} }
  #player.dead{ transform:rotate(94deg) translateY(20%) scale(0.9); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8)); transition:transform .3s ease-out; }

  #hidezone{
    position:absolute; left:1%; bottom:10%; width:27%; height:24%;
    border:2px dashed rgba(0, 184, 148, 0.4); border-radius:14px; opacity:0; pointer-events:none; z-index:5;
    background: linear-gradient(rgba(0,184,148,0.1), transparent);
    transition:opacity .2s;
  }
  #hidezone.show{opacity:1;}

  #speedlines{position:absolute; inset:0; opacity:0; pointer-events:none; z-index:15;
    background:repeating-linear-gradient(105deg, transparent 0 20px, rgba(255,255,255,0.05) 20px 24px);
  }
  #speedlines.on{opacity:1; animation:slide .2s linear infinite;}
  @keyframes slide{ from{background-position:0 0;} to{background-position:-200px 0;} }

  #flash{position:absolute; inset:0; background:radial-gradient(circle, transparent 20%, var(--danger) 100%); opacity:0; pointer-events:none; z-index:40;}
  #flash.hit{animation:flash .5s ease-out;}
  @keyframes flash{ 0%{opacity:1; background-color:rgba(232, 65, 24, 0.8);} 100%{opacity:0;} }

  /* UI 介面重製 */
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px 20px; color:var(--paper); 
  }
  #hud .label{font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.6); text-transform:uppercase;}
  #hud .value{font-family:"Courier New",monospace; font-size:28px; font-weight:900; text-shadow: 0 0 10px rgba(255,255,255,0.3);}
  
  #streak{position:absolute; top:20px; left:50%; transform:translateX(-50%); z-index:30;
    color:var(--line-yellow); font-size:14px; font-weight:bold; letter-spacing:2px; text-shadow:0 0 8px rgba(255,204,0,0.8);}

  #controls{
    position:absolute; bottom:0; left:0; right:0; z-index:30;
    display:flex; gap:16px; padding:20px; padding-bottom:calc(20px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,0.8) 80%);
  }
  .btn{
    flex:1; border:none; border-radius:18px; padding:18px 10px; font-size:22px; font-weight:900;
    letter-spacing:4px; color:var(--paper); font-family:inherit; position:relative; overflow:hidden;
    transition:transform .1s, filter .1s;
    backdrop-filter: blur(4px);
  }
  .btn:active, .btn.pressed{transform:scale(0.95); filter:brightness(0.8);}
  #btn-left{
    background:rgba(0, 184, 148, 0.2); border: 2px solid var(--safe);
    box-shadow: 0 0 15px rgba(0, 184, 148, 0.3) inset, 0 4px 10px rgba(0,0,0,0.5);
  }
  #btn-left.pressed{ background:var(--safe); color:#000; box-shadow: 0 0 20px var(--safe); }
  
  #btn-dash{
    background:rgba(232, 65, 24, 0.2); border: 2px solid var(--danger);
    box-shadow: 0 0 15px rgba(232, 65, 24, 0.3) inset, 0 4px 10px rgba(0,0,0,0.5);
  }
  #btn-dash:disabled{opacity:.3; border-color:gray; background:rgba(100,100,100,0.2);}
  #btn-dash:not(:disabled):active{ background:var(--danger); color:#000; box-shadow: 0 0 20px var(--danger); }
  
  .btn small{display:block; font-size:10px; letter-spacing:2px; font-weight:400; opacity:.8; margin-top:6px;}

  /* 遊戲開始/結束選單毛玻璃重製 */
  .overlay{
    position:absolute; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:30px;
    background:rgba(10, 10, 15, 0.75); backdrop-filter: blur(8px);
    color:var(--paper); transition: opacity 0.3s ease;
  }
  .overlay.hidden{opacity: 0; pointer-events: none;}
  .overlay h1{font-size:36px; margin:0 0 10px; letter-spacing:6px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);}
  .overlay h1 span{color:var(--line-yellow);}
  .overlay p{font-size:14px; line-height:1.8; color:#b2bec3; max-width:320px; margin:10px 0 24px;}
  .overlay .big{font-family:"Courier New",monospace; font-size:64px; font-weight:900; color:var(--line-yellow); margin:0; text-shadow: 0 0 20px rgba(255,204,0,0.4);}
  .overlay .small{font-size:14px; color:#636e72; margin-bottom:30px; font-weight:bold;}
  
  .startBtn{
    border:none; border-radius:30px; padding:18px 48px; font-size:20px; font-weight:900; letter-spacing:6px;
    color:#fff; background: linear-gradient(135deg, #e84118, #c23616);
    box-shadow: 0 8px 20px rgba(232, 65, 24, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
    font-family:inherit; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  }
  .startBtn:active{transform:translateY(4px); box-shadow: 0 2px 10px rgba(232, 65, 24, 0.4);}
</style>
</head>
<body>
<div id="stage">

  <svg id="skyline" viewBox="0 0 400 60" preserveAspectRatio="none">
    <rect x="0" y="20" width="30" height="40" fill="#2d3436"/>
    <rect x="5" y="25" width="8" height="6" fill="#feca57" opacity="0.6"/>
    <rect x="34" y="10" width="22" height="50" fill="#1e272e"/>
    <rect x="60" y="26" width="18" height="34" fill="#2d3436"/>
    <rect x="82" y="4" width="26" height="56" fill="#1e272e"/>
    <rect x="88" y="12" width="6" height="12" fill="#feca57" opacity="0.8"/>
    <rect x="130" y="18" width="20" height="42" fill="#2d3436"/>
    <rect x="160" y="0" width="30" height="60" fill="#1e272e"/>
    <rect x="170" y="8" width="10" height="8" fill="#feca57" opacity="0.5"/>
    <rect x="200" y="22" width="16" height="38" fill="#2d3436"/>
    <rect x="230" y="12" width="24" height="48" fill="#1e272e"/>
    <rect x="236" y="20" width="6" height="15" fill="#feca57" opacity="0.7"/>
    <rect x="270" y="24" width="18" height="36" fill="#2d3436"/>
    <rect x="300" y="6" width="28" height="54" fill="#1e272e"/>
    <rect x="340" y="20" width="20" height="40" fill="#2d3436"/>
    <rect x="370" y="14" width="24" height="46" fill="#1e272e"/>
  </svg>

  <div class="buildings" id="buildings-left"></div>
  <div class="buildings" id="buildings-right"></div>

  <div id="road">
    <div id="centerline"></div>
  </div>
  <div id="shoulder"></div>

  <div id="vlayer"></div>
  <div id="speedlines"></div>
  <div id="hidezone"></div>

  <div id="shelter"></div>
  <div id="player"></div>

  <div id="flash"></div>

  <div id="hud">
    <div>
      <div class="label">距離 Distance</div>
      <div class="value" id="score">0<span style="font-size:16px; opacity:0.6;">m</span></div>
    </div>
    <div style="text-align:right">
      <div class="label">最佳 Best</div>
      <div class="value" id="best">0<span style="font-size:16px; opacity:0.6;">m</span></div>
    </div>
  </div>
  <div id="streak"></div>

  <div id="controls">
    <button class="btn" id="btn-left">閃<small>按住躲藏</small></button>
    <button class="btn" id="btn-dash">衝<small>抓空檔前進</small></button>
  </div>

  <div class="overlay" id="start-overlay">
    <h1>嘉興路<span>行人地獄</span></h1>
    <p>竹北嘉興路沒有人行道，走在路邊本來就跟車流搶道。<br><br>
       長按「閃」躲到掩體後方。<br>抓準空檔按「衝」賭一把跑到下個掩體，衝刺途中無法再躲。</p>
    <button class="startBtn" id="start-btn">開始地獄</button>
  </div>

  <div class="overlay hidden" id="over-overlay">
    <h1 style="color:var(--danger)">你被撞飛了</h1>
    <div class="big" id="final-score">0m</div>
    <div class="small" id="best-note"></div>
    <button class="startBtn" id="retry-btn">再試一次</button>
  </div>

</div>

<script>
(function(){
  const $ = (s)=>document.querySelector(s);
  const vlayer = $('#vlayer');
  const player = $('#player');
  const shelter = $('#shelter');
  const scoreEl = $('#score');
  const bestEl = $('#best');
  const streakEl = $('#streak');
  const flashEl = $('#flash');
  const speedlinesEl = $('#speedlines');
  const hidezoneEl = $('#hidezone');
  const startOverlay = $('#start-overlay');
  const overOverlay = $('#over-overlay');
  const btnLeft = $('#btn-left');
  const btnDash = $('#btn-dash');

  let bestScore = 0;

  // 移除了 Wobble 濾鏡，確保 SVG 在放大縮小時代碼邊緣清晰乾淨
  function svgWrap(inner, vb){
    return `<svg viewBox="${vb}" width="100%" height="100%" style="overflow:visible">${inner}</svg>`;
  }
  
  function shade(hex, amt){
    const n = parseInt(hex.slice(1),16);
    let r=(n>>16)+amt, g=(n>>8&0xff)+amt, b=(n&0xff)+amt;
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).padStart(6, '0');
  }

  // 🎨 【重製】主角：改穿顯眼的黃色螢光反光外套，頭部與肢體分離感更明確
  const PLAYER_SVG = svgWrap(`
    <ellipse cx="30" cy="95" rx="18" ry="6" fill="#00000066"/>
    <rect x="20" y="70" width="7" height="25" rx="3" fill="#2d3436"/>
    <rect x="33" y="70" width="7" height="25" rx="3" fill="#2d3436"/>
    <path d="M16 35 Q30 30 44 35 L48 70 Q30 75 12 70 Z" fill="#fdcb6e"/>
    <path d="M16 35 Q30 30 44 35 L48 70 Q30 75 12 70 Z" fill="url(#vest-grad)" opacity="0.5"/>
    <rect x="18" y="38" width="24" height="28" rx="6" fill="#e17055"/>
    <path d="M18 45 L42 45" stroke="#2d3436" stroke-width="3"/>
    <path d="M14 38 Q8 55 12 75" stroke="#ffeaa7" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M46 38 Q52 55 48 75" stroke="#ffeaa7" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="30" cy="22" r="14" fill="#fab1a0"/>
    <path d="M16 20 Q30 2 44 20 Q46 10 30 5 Q14 10 16 20 Z" fill="#2d3436"/>
    <defs>
      <linearGradient id="vest-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fff"/>
        <stop offset="1" stop-color="#000"/>
      </linearGradient>
    </defs>
  `, "0 0 60 105");

  // 🎨 【重製】掩蔽物：更精緻的陰影與高光，車輛加入閃爍的警示燈感
  const SHELTER_ART = {
    car: svgWrap(`
      <ellipse cx="60" cy="85" rx="55" ry="10" fill="#00000088"/>
      <path d="M10 80 L14 45 Q20 30 40 28 L80 28 Q100 30 106 45 L110 80 Z" fill="#636e72"/>
      <path d="M10 80 L14 45 Q20 30 40 28 L80 28 Q100 30 106 45 L110 80 Z" fill="linear-gradient(to bottom, #b2bec3, #2d3436)" opacity="0.5"/>
      <path d="M26 44 Q34 32 50 31 L70 31 Q86 32 94 44 Z" fill="#2d3436"/>
      <path d="M28 44 Q36 34 50 33 L65 33 L60 44 Z" fill="#74b9ff" opacity="0.3"/>
      <rect x="20" y="75" width="14" height="15" rx="4" fill="#111"/>
      <rect x="86" y="75" width="14" height="15" rx="4" fill="#111"/>
      <rect x="12" y="55" width="14" height="10" rx="3" fill="#d63031"/>
      <rect x="94" y="55" width="14" height="10" rx="3" fill="#d63031"/>
      <rect x="48" y="70" width="24" height="8" fill="#dfe6e9" rx="1"/>
    `, "0 0 120 95"),
    scooter: svgWrap(`
      <ellipse cx="55" cy="82" rx="45" ry="8" fill="#00000088"/>
      <path d="M22 80 Q20 55 35 50 L65 50 Q80 52 82 72 L82 80Z" fill="#2d3436"/>
      <path d="M24 78 Q22 58 35 54 L65 54 Z" fill="#636e72"/>
      <circle cx="32" cy="76" r="12" fill="#111"/>
      <circle cx="32" cy="76" r="5" fill="#dfe6e9"/>
      <circle cx="78" cy="76" r="12" fill="#111"/>
      <circle cx="78" cy="76" r="5" fill="#dfe6e9"/>
      <rect x="42" y="24" width="34" height="10" rx="5" fill="#111"/>
      <rect x="62" y="28" width="6" height="24" rx="3" fill="#636e72"/>
      <rect x="54" y="20" width="22" height="6" rx="3" fill="#b2bec3"/>
      <circle cx="50" cy="23" r="3" fill="#d63031"/>
    `, "0 0 100 95"),
    plant: svgWrap(`
      <ellipse cx="40" cy="88" rx="30" ry="8" fill="#00000088"/>
      <path d="M20 60 L28 88 L52 88 L60 60 Z" fill="#b2bec3"/>
      <path d="M20 60 L60 60 L56 52 L24 52 Z" fill="#636e72"/>
      <circle cx="40" cy="40" r="22" fill="#00b894"/>
      <circle cx="28" cy="30" r="15" fill="#55efc4"/>
      <circle cx="52" cy="28" r="16" fill="#00cec9"/>
      <circle cx="40" cy="18" r="14" fill="#81ecec"/>
      <path d="M30 45 Q40 25 50 45 Z" fill="#000" opacity="0.2"/>
    `, "0 0 80 95"),
  };

  const CAR_COLORS = ["#d63031","#dfe6e9","#2d3436","#0984e3","#e1b12c"];
  const JACKET_COLORS = ["#2d3436","#111","#d63031","#00b894","#0984e3"];
  let vehicleUid = 0;

  // 🎨 【重製】迎面而來的車輛：加入強烈的發光頭燈(radialGradient)與玻璃反光
  function vehicleSVG(type){
    const uid = 'v'+(vehicleUid++);
    if(type==='car'){
      const c = CAR_COLORS[Math.floor(Math.random()*CAR_COLORS.length)];
      const bodyTop = shade(c,-20), bodyBot = shade(c,20);
      return svgWrap(`
        <defs>
          <linearGradient id="body${uid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="${bodyTop}"/>
            <stop offset="0.5" stop-color="${c}"/>
            <stop offset="1" stop-color="${bodyBot}"/>
          </linearGradient>
          <radialGradient id="lamp${uid}" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="40%" stop-color="#ffeaa7"/>
            <stop offset="100%" stop-color="rgba(255, 234, 167, 0)"/>
          </radialGradient>
        </defs>
        <ellipse cx="80" cy="108" rx="70" ry="10" fill="#000000aa"/>
        <path d="M10 92 L14 46 Q18 14 60 10 L100 10 Q142 14 146 46 L150 92 Z" fill="url(#body${uid})"/>
        <path d="M30 46 Q38 22 62 20 L98 20 Q122 22 130 47 L124 46 L36 46Z" fill="#1e272e"/>
        <path d="M38 24 L78 40" stroke="#74b9ff" stroke-width="6" opacity="0.4" stroke-linecap="round"/>
        <circle cx="36" cy="94" r="18" fill="#111"/>
        <circle cx="36" cy="94" r="8" fill="#636e72"/>
        <circle cx="124" cy="94" r="18" fill="#111"/>
        <circle cx="124" cy="94" r="8" fill="#636e72"/>
        <rect x="55" y="80" width="50" height="12" rx="3" fill="#111"/>
        <line x1="60" y1="86" x2="100" y2="86" stroke="#2d3436" stroke-width="2"/>
        <circle cx="25" cy="65" r="28" fill="url(#lamp${uid})"/>
        <circle cx="135" cy="65" r="28" fill="url(#lamp${uid})"/>
        <circle cx="25" cy="65" r="8" fill="#fff"/>
        <circle cx="135" cy="65" r="8" fill="#fff"/>
      `, "0 0 160 120");
    }
    
    // 機車騎士
    const jc = JACKET_COLORS[Math.floor(Math.random()*JACKET_COLORS.length)];
    return svgWrap(`
      <defs>
        <linearGradient id="jacket${uid}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="${shade(jc,20)}"/>
          <stop offset="1" stop-color="${shade(jc,-20)}"/>
        </linearGradient>
        <radialGradient id="hlamp${uid}" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="50%" stop-color="#81ecec"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>
      <ellipse cx="60" cy="120" rx="45" ry="8" fill="#000000aa"/>
      <path d="M38 108 Q40 70 60 68 Q80 70 82 108Z" fill="#2d3436"/>
      <circle cx="60" cy="112" r="22" fill="#111"/>
      <circle cx="60" cy="112" r="12" fill="#636e72"/>
      <circle cx="60" cy="70" r="30" fill="url(#hlamp${uid})"/>
      <circle cx="60" cy="70" r="10" fill="#fff"/>
      <rect x="20" y="60" width="80" height="8" rx="4" fill="#111"/>
      <path d="M42 30 Q60 10 78 30 Q80 45 60 48 Q40 45 42 30Z" fill="url(#jacket${uid})"/>
      <circle cx="60" cy="10" r="18" fill="#ffeaa7"/>
      <path d="M44 8 Q60 -10 76 8 Q80 2 60 0 Q40 2 44 8Z" fill="#111"/>
      <path d="M48 10 Q60 20 72 10 L68 20 Q60 26 52 20Z" fill="#0984e3" opacity="0.8"/>
      <path d="M44 32 L30 55" stroke="url(#jacket${uid})" stroke-width="10" stroke-linecap="round"/>
      <path d="M76 32 L90 55" stroke="url(#jacket${uid})" stroke-width="10" stroke-linecap="round"/>
    `, "0 -10 120 135");
  }

  // 背景的鐵皮屋與公寓，加入微弱的窗戶光源
  function buildingsMarkup(seedOffset){
    let s = '';
    for(let i=0;i<5;i++){
      const y = i*90;
      const shutter = (i%2===0) ? 'var(--shutter-cream)' : '#1e272e';
      const signColor = (i+seedOffset)%2===0 ? 'var(--shutter-red)' : 'var(--sign-blue)';
      s += `
        <g transform="translate(0 ${y})">
          <rect x="0" y="0" width="200" height="80" fill="${shutter}" stroke="#111" stroke-width="3"/>
          ${Array.from({length:8}).map((_,k)=>`<line x1="${k*25}" y1="0" x2="${k*25}" y2="80" stroke="#000" stroke-width="4" opacity="0.3"/>`).join('')}
          <rect x="15" y="-28" width="80" height="26" rx="2" fill="${signColor}" stroke="#111" stroke-width="2"/>
          <rect x="20" y="-23" width="70" height="16" fill="rgba(255,255,255,0.2)"/>
        </g>
      `;
    }
    return `<svg viewBox="0 0 200 500" preserveAspectRatio="none" width="100%" height="100%" style="position:absolute;inset:0;">${s}</svg>`;
  }
  $('#buildings-left').innerHTML = buildingsMarkup(0);
  $('#buildings-right').innerHTML = buildingsMarkup(1);
  player.innerHTML = PLAYER_SVG;

  // --- 以下為融合了「動態透視修正」的遊戲核心邏輯 ---
  const STATE = { IDLE:'idle', SHELTERED:'sheltered', DASHING:'dashing', OVER:'over' };
  let state = STATE.IDLE;
  let distance = 0;
  let vehicles = [];
  let isHiding = false;
  let dashEndAt = 0;
  let lastSpawn = 0;
  let spawnInterval = 1300;
  let dodgedCount = 0;
  let shelterTypes = ['car','scooter','plant'];
  let rafId = null;
  let dashPendingGap = 0;

  // 動態透視所需變數
  let dashStartAt = 0;
  let dashDuration = 0;
  let shelterDefaultTopPercent = 65; // 預設的 CSS Top 基準 (用測量的)

  function difficultyFactor(){ return Math.min(1.5, 1 + distance/450); }

  function pickShelter(){
    const t = shelterTypes[Math.floor(Math.random()*shelterTypes.length)];
    shelter.innerHTML = SHELTER_ART[t];
  }

  // 計算響應式畫面下，掩體的正確 Top 百分比
  function measureShelterTop() {
    const stageH = $('#stage').clientHeight;
    if(stageH > 0) {
      shelterDefaultTopPercent = (shelter.offsetTop / stageH) * 100;
    }
  }

  function resetGame(){
    distance = 0; vehicles.forEach(v=>v.el.remove()); vehicles=[];
    dodgedCount = 0; spawnInterval = 1300;
    scoreEl.innerHTML = '0<span style="font-size:16px; opacity:0.6;">m</span>';
    streakEl.textContent = '';
    player.className = ''; isHiding = false;
    pickShelter();
    
    // 重置掩體原生的 CSS 定位
    shelter.style.left = '4%';
    shelter.style.top = 'auto';
    shelter.style.bottom = '15%';
    shelter.style.transform = 'none';

    state = STATE.SHELTERED;
    lastSpawn = performance.now();
    flashEl.className='';
    speedlinesEl.className='';
    btnDash.disabled = false;
    setTimeout(measureShelterTop, 50); 
  }

  function startGame(){
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    resetGame();
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(){
    if(state===STATE.OVER) return;
    state = STATE.OVER;
    player.classList.remove('hiding');
    player.classList.add('dead');
    flashEl.classList.remove('hit'); void flashEl.offsetWidth; flashEl.classList.add('hit');
    speedlinesEl.classList.remove('on');
    const d = Math.floor(distance);
    bestScore = Math.max(bestScore, d);
    bestEl.innerHTML = bestScore+'<span style="font-size:16px; opacity:0.6;">m</span>';
    setTimeout(()=>{
      $('#final-score').textContent = d+'m';
      $('#best-note').textContent = d>=bestScore ? '🎉 突破新紀錄！' : ('最佳紀錄 '+bestScore+'m');
      overOverlay.classList.remove('hidden');
      cancelAnimationFrame(rafId);
    }, 600);
  }

  function trySpawn(now){
    if(now - lastSpawn < spawnInterval/difficultyFactor()) return;
    lastSpawn = now;
    const bigGap = Math.random() < 0.3;
    spawnInterval = bigGap ? (2600 + Math.random()*2000) : (1400 + Math.random()*1000);
    const type = Math.random()<0.65 ? 'scooter' : 'car';
    const duration = (type==='scooter'? 1900:2300) / difficultyFactor();
    const el = document.createElement('div');
    el.className = 'vehicle';
    el.innerHTML = vehicleSVG(type);
    const w = type==='scooter'? 75:115;
    el.style.width = w+'px';
    el.style.left = '50%';
    el.style.top = '18%';
    vlayer.appendChild(el);
    const laneEndX = (type==='scooter' ? 30 : 36) + (Math.random()*4-2);
    vehicles.push({ el, type, spawnAt: now, duration, impactAt: now+duration, resolved:false, laneEndX });
  }

  function updateVehicles(now){
    for(let i=vehicles.length-1;i>=0;i--){
      const v = vehicles[i];
      let p = (now - v.spawnAt)/v.duration;
      if(p>1) p=1;
      const ease = p*p*(3-2*p);
      const scale = 0.12 + ease*1.6;
      const yTop = 18, yEnd = 92;
      const y = yTop + (yEnd-yTop)*ease;
      const xStart = 50, xEnd = v.laneEndX;
      const x = xStart + (xEnd-xStart)*ease;
      v.el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
      v.el.style.left = x+'%';
      v.el.style.top = y+'%';
      v.el.style.zIndex = 10+Math.floor(ease*10);

      if(!v.resolved && now >= v.impactAt){
        v.resolved = true;
        resolveImpact(v, now);
      }
      if(now >= v.impactAt + 260){
        v.el.remove();
        vehicles.splice(i,1);
      }
    }
  }

  function resolveImpact(v, now){
    if(state===STATE.DASHING){ endGame(); return; }
    if(state!==STATE.SHELTERED) return;
    if(isHiding){
      dodgedCount++;
      streakEl.textContent = dodgedCount>=3 ? ('連續安全躲過 x'+dodgedCount) : '';
    } else {
      endGame();
    }
  }

  function setHiding(v){
    if(state===STATE.OVER) return;
    if(state===STATE.DASHING) return;
    isHiding = v;
    player.classList.toggle('hiding', v);
    hidezoneEl.classList.toggle('show', v);
    if(v){ dodgedCount = 0; }
    else { streakEl.textContent=''; }
    btnLeft.classList.toggle('pressed', v);
  }

  function pressDash(){
    if(state!==STATE.SHELTERED || isHiding) return;
    state = STATE.DASHING;
    dodgedCount = 0; streakEl.textContent='';
    
    const gap = 15 + Math.random()*45;
    const dur = 500 + gap*15;
    
    dashDuration = dur;
    dashStartAt = performance.now();
    dashEndAt = dashStartAt + dur;
    
    player.classList.add('dashing');
    speedlinesEl.classList.add('on');

    // 複製舊掩體並往後拋
    const oldShelter = shelter.cloneNode(true);
    oldShelter.style.position = 'absolute';
    oldShelter.style.left = '4%';
    oldShelter.style.bottom = '15%';
    oldShelter.style.width = '23%';
    oldShelter.style.transition = 'transform .45s ease-in, opacity .45s ease-in';
    $('#stage').appendChild(oldShelter);
    setTimeout(() => {
      oldShelter.style.transform = 'translate(-120%, 50%) scale(0.8)';
      oldShelter.style.opacity = '0';
    }, 10);
    setTimeout(() => oldShelter.remove(), 500);

    pickShelter();
    updateShelterAnimation(0);

    dashPendingGap = gap;
    btnDash.disabled = true;
  }

  // 三次方曲線透視捲動
  function updateShelterAnimation(dashP) {
    const ease = Math.pow(dashP, 3);
    const startLeft = 45;
    const endLeft = 4;
    const startTop = 20; 
    const endTop = shelterDefaultTopPercent;
    const startScale = 0.05;
    const endScale = 1;

    const currentLeft = startLeft + (endLeft - startLeft) * ease;
    const currentTop = startTop + (endTop - startTop) * ease;
    const currentScale = startScale + (endScale - startScale) * ease;

    shelter.style.bottom = 'auto';
    shelter.style.left = currentLeft + '%';
    shelter.style.top = currentTop + '%';
    shelter.style.transform = `scale(${currentScale})`;
  }

  function finishDash(){
    distance += dashPendingGap;
    scoreEl.innerHTML = Math.floor(distance)+'<span style="font-size:16px; opacity:0.6;">m</span>';
    player.classList.remove('dashing');
    speedlinesEl.classList.remove('on');
    
    shelter.style.left = '4%';
    shelter.style.top = 'auto';
    shelter.style.bottom = '15%';
    shelter.style.transform = 'none';
    
    state = STATE.SHELTERED;
    btnDash.disabled = false;
  }

  function loop(now){
    if(state===STATE.OVER) return;
    if(state===STATE.SHELTERED){ trySpawn(now); }
    if(state===STATE.DASHING){
      trySpawn(now);
      let dashP = (now - dashStartAt) / dashDuration;
      if(dashP > 1) dashP = 1;
      updateShelterAnimation(dashP);
      if(now >= dashEndAt){ finishDash(); }
    }
    updateVehicles(now);
    rafId = requestAnimationFrame(loop);
  }

  function bindHold(btn, onDown, onUp){
    btn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); onDown(); btn.setPointerCapture && btn.setPointerCapture(e.pointerId); });
    btn.addEventListener('pointerup', (e)=>{ e.preventDefault(); onUp(); });
    btn.addEventListener('pointercancel', onUp);
    btn.addEventListener('pointerleave', onUp);
  }
  bindHold(btnLeft, ()=>setHiding(true), ()=>setHiding(false));
  btnDash.addEventListener('pointerdown', (e)=>{ e.preventDefault(); pressDash(); });

  window.addEventListener('keydown', (e)=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A'){ if(!e.repeat) setHiding(true); }
    if((e.key==='ArrowRight' || e.key===' ' || e.key==='d' || e.key==='D') && !e.repeat) pressDash();
  });
  window.addEventListener('keyup', (e)=>{
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A') setHiding(false);
  });

  $('#start-btn').addEventListener('click', startGame);
  $('#retry-btn').addEventListener('click', startGame);

  pickShelter();
  setTimeout(measureShelterTop, 100);
})();
</script>
</body>
</html>
